<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOOMZE 内容管理系统</title>
    <link rel="icon" type="image/png" href="../KOOMZE/favicon.png">
    <!-- Quill 富文本编辑器 CDN -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #0b0c10;
            color: #e8e8f0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: #1d1e26;
            border-radius: 24px;
            padding: 32px 28px;
            border: 1px solid #2e303a;
        }
        h1 { font-size: 26px; display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
        .subtitle { color: #a8aab8; font-size: 14px; margin-bottom: 24px; border-bottom: 1px solid #2e303a; padding-bottom: 16px; }
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
        .tab-btn {
            padding: 8px 18px; border-radius: 20px; border: 1px solid #2e303a;
            background: transparent; color: #a8aab8; cursor: pointer;
            font-weight: 500; font-size: 13px; transition: all 0.25s;
        }
        .tab-btn:hover { border-color: #e33f3f; color: #fff; }
        .tab-btn.active { background: #e33f3f; border-color: #e33f3f; color: #fff; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 500; font-size: 13px; margin-bottom: 4px; color: #c8c8d8; }
        input, textarea, select {
            width: 100%; padding: 10px 14px; background: #0b0c10;
            border: 1px solid #2e303a; border-radius: 10px; color: #e8e8f0;
            font-size: 14px; outline: none; transition: border-color 0.25s;
        }
        select { cursor: pointer; }
        input:focus, textarea:focus, select:focus { border-color: #e33f3f; box-shadow: 0 0 0 3px rgba(227,63,63,0.2); }
        textarea { min-height: 60px; resize: vertical; }
        .btn {
            padding: 12px 28px; border: none; border-radius: 12px;
            font-weight: 600; font-size: 15px; cursor: pointer;
            background: #e33f3f; color: #fff; width: 100%;
            transition: background 0.25s, transform 0.15s;
        }
        .btn:hover { background: #ff5252; transform: translateY(-1px); }
        #message { margin-top: 16px; padding: 12px 16px; border-radius: 10px; display: none; }
        #message.show { display: block; }
        #message.success { border-left: 4px solid #2ecc71; background: #1a2a1e; }
        #message.error { border-left: 4px solid #e74c3c; background: #2a1a1a; }
        .list-section { margin-top: 28px; border-top: 1px solid #2e303a; padding-top: 18px; }
        .list-section h3 { font-size: 16px; margin-bottom: 12px; color: #c8c8d8; }
        .item {
            background: #0b0c10; padding: 12px 16px; border-radius: 10px;
            margin-bottom: 8px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid #2e303a;
        }
        .item .info { display: flex; flex-direction: column; gap: 2px; }
        .item .name { font-weight: 600; font-size: 14px; }
        .item .meta { color: #a8aab8; font-size: 12px; }
        .del-btn { background: transparent; border: none; color: #a8aab8; cursor: pointer; font-size: 18px; padding: 4px 6px; border-radius: 6px; }
        .del-btn img { filter: brightness(0) invert(1); }
        .item .del-btn:hover { background: #2a1a1a; color: #e74c3c; }
        .empty { color: #6a6c7a; text-align: center; padding: 16px 0; font-size: 13px; }
        .field-hint { color: #6a6c7a; font-size: 12px; margin-top: 2px; }
        .upload-row { display: flex; gap: 8px; align-items: center; }
        .upload-row input { flex: 1; }
        .upload-btn {
            padding: 10px 16px; border-radius: 10px; border: 1px dashed #2e303a;
            background: transparent; color: #a8aab8; cursor: pointer;
            font-size: 13px; white-space: nowrap; transition: all 0.25s;
        }
        .upload-btn:hover { border-color: #e33f3f; color: #e33f3f; background: rgba(227,63,63,0.08); }
        .upload-btn.uploading { opacity: 0.5; pointer-events: none; }
        .upload-btn.done { border-color: #2ecc71; color: #2ecc71; }
        .img-preview {
            width: 100%; max-height: 120px; object-fit: contain;
            border-radius: 8px; margin-top: 6px; display: none; border: 1px solid #2e303a;
        }
        .img-preview.show { display: block; }

        /* ====== 编辑模式 ====== */
        .edit-indicator {
            display: none; align-items: center; gap: 10px;
            margin-bottom: 12px; padding: 10px 16px;
            background: rgba(227,63,63,0.12); border-left: 3px solid #e33f3f;
            border-radius: 6px; font-size: 13px; color: #e33f3f; font-weight: 600;
        }
        .edit-indicator.show { display: flex; }
        .cancel-edit-btn {
            margin-left: auto; padding: 6px 14px; border: 1px solid #e33f3f;
            border-radius: 6px; background: transparent; color: #e33f3f;
            cursor: pointer; font-size: 12px; transition: all 0.2s;
        }
        .cancel-edit-btn:hover { background: #e33f3f; color: #fff; }
        .item.editing {
            border-color: #e33f3f; background: rgba(227,63,63,0.08);
            cursor: default;
        }
        .item:not(.editing) { cursor: pointer; }
        .item:not(.editing):hover { border-color: #e33f3f; }
        .submit-row { display: flex; gap: 10px; }
        .submit-row .btn { flex: 1; }
        .submit-row .btn-cancel {
            flex: 0 0 auto; padding: 12px 24px;
            border: 1px solid #2e303a; border-radius: 12px;
            background: transparent; color: #a8aab8; cursor: pointer;
            font-weight: 600; font-size: 15px; transition: all 0.25s;
        }
        .submit-row .btn-cancel:hover { border-color: #e33f3f; color: #e33f3f; }

        /* ====== 产品对照表 ====== */
        .lookup-section {
            margin-top: 32px; border-top: 1px solid #2e303a; padding-top: 20px;
        }
        .lookup-section h3 { font-size: 16px; margin-bottom: 14px; color: #c8c8d8; }
        .lookup-search-row {
            display: flex; gap: 10px; margin-bottom: 14px;
        }
        .lookup-search-row input { flex: 1; }
        .lookup-search-row button {
            padding: 10px 20px; border: none; border-radius: 10px;
            background: #e33f3f; color: #fff; cursor: pointer;
            font-weight: 600; font-size: 13px; white-space: nowrap;
            transition: background 0.25s;
        }
        .lookup-search-row button:hover { background: #ff5252; }
        .lookup-search-row button.secondary { background: #2e303a; color: #e8e8f0; }
        .lookup-search-row button.secondary:hover { background: #3e404a; }
        .lookup-table {
            width: 100%; border-collapse: collapse; font-size: 13px;
        }
        .lookup-table th, .lookup-table td {
            padding: 10px 14px; text-align: left; border-bottom: 1px solid #2e303a;
        }
        .lookup-table th {
            color: #6a6c7a; font-weight: 600; font-size: 12px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .lookup-table td { color: #c8c8d8; }
        .lookup-table tr:hover td { background: rgba(227,63,63,0.06); }
        .lookup-table .pid { color: #e33f3f; font-weight: 600; font-family: monospace; }
        .lookup-table .cat-badge {
            display: inline-block; padding: 2px 10px; border-radius: 12px;
            font-size: 11px; font-weight: 600;
            background: rgba(227,63,63,0.15); color: #e33f3f; border: 1px solid rgba(227,63,63,0.3);
        }
        .lookup-count { color: #6a6c7a; font-size: 12px; margin-bottom: 10px; }

        /* ====== 编辑已上传数据 — 搜索/筛选工具栏 ====== */
        .list-toolbar {
            display: flex; gap: 10px; align-items: center; margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .list-toolbar .list-search {
            flex: 1; min-width: 200px;
            padding: 9px 14px; background: #0b0c10;
            border: 1px solid #2e303a; border-radius: 10px;
            color: #e8e8f0; font-size: 13px; outline: none;
            transition: border-color 0.25s;
        }
        .list-toolbar .list-search:focus { border-color: #e33f3f; }
        .list-toolbar .list-search::placeholder { color: #6a6c7a; }
        .list-toolbar .list-filter {
            padding: 9px 14px; background: #0b0c10;
            border: 1px solid #2e303a; border-radius: 10px;
            color: #e8e8f0; font-size: 13px; cursor: pointer; outline: none;
            min-width: 130px;
        }
        .list-toolbar .list-filter:focus { border-color: #e33f3f; }
        .list-toolbar .list-result-count { color: #6a6c7a; font-size: 12px; white-space: nowrap; }

        /* 列表项操作按钮区 */
        .item .item-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
        .edit-item-btn {
            background: transparent; border: 1px solid #2e303a; border-radius: 6px;
            color: #a8aab8; cursor: pointer; font-size: 12px; font-weight: 600;
            padding: 5px 12px; transition: all 0.25s; white-space: nowrap;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .edit-item-btn:hover { background: rgba(227,63,63,0.12); border-color: #e33f3f; color: #e33f3f; }

        /* 模式标识（新建 / 编辑） */
        .mode-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 20px;
            font-size: 12px; font-weight: 700;
            transition: all 0.3s ease;
        }
        .mode-badge.create-mode { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
        .mode-badge.edit-mode { background: rgba(227,63,63,0.15); color: #e33f3f; border: 1px solid rgba(227,63,63,0.3); }

        /* productId 输入自动提示 */
        .pid-suggest {
            position: absolute; background: #1d1e26; border: 1px solid #2e303a;
            border-radius: 8px; max-height: 160px; overflow-y: auto;
            z-index: 10; display: none; width: calc(100% - 28px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .pid-suggest.show { display: block; }
        .pid-suggest-item {
            padding: 8px 14px; cursor: pointer; font-size: 13px;
            display: flex; justify-content: space-between;
        }
        .pid-suggest-item:hover { background: rgba(227,63,63,0.15); }
        .pid-suggest-item .sug-id { color: #e33f3f; font-weight: 600; }
        .pid-suggest-item .sug-name { color: #a8aab8; }

        /* Admin icon: make dark SVG white for dark theme */
        .admin-icon { width: 18px; height: 18px; object-fit: contain; vertical-align: middle; filter: brightness(0) invert(1); }
        .admin-icon-sm { width: 14px; height: 14px; object-fit: contain; vertical-align: middle; filter: brightness(0) invert(1); }
        .admin-icon-lg { width: 22px; height: 22px; object-fit: contain; vertical-align: middle; filter: brightness(0) invert(1); }
        /* Required badge */
        .required-badge { display: inline-flex; align-items: center; gap: 3px; color: #e33f3f; font-size: 12px; font-weight: 600; margin-left: 4px; }
        .required-badge img { width: 14px; height: 14px; object-fit: contain; filter: brightness(0) saturate(100%) invert(25%) sepia(85%) saturate(3200%) hue-rotate(345deg) brightness(95%) contrast(95%); }

        /* ====== 颜色管理 ====== */
        .color-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid #2e303a; }
        .color-section .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .color-section .section-title { font-size: 14px; font-weight: 600; color: #c8c8d8; }
        .color-add-btn {
            padding: 6px 16px; border: 1px dashed #2e303a; border-radius: 8px;
            background: transparent; color: #a8aab8; cursor: pointer;
            font-size: 12px; font-weight: 600; transition: all 0.25s;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .color-add-btn:hover { border-color: #e33f3f; color: #e33f3f; background: rgba(227,63,63,0.08); }
        .color-row {
            display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px;
            background: #0b0c10; border: 1px solid #2e303a; border-radius: 10px;
            padding: 12px; position: relative;
        }
        .color-row .color-field { flex: 1; }
        .color-row .color-field label { font-size: 12px; color: #6a6c7a; margin-bottom: 2px; }
        .color-row .color-field input {
            width: 100%; padding: 8px 12px; background: #1d1e26; border: 1px solid #2e303a;
            border-radius: 8px; color: #e8e8f0; font-size: 13px; outline: none;
        }
        .color-row .color-field input:focus { border-color: #e33f3f; }
        .color-row .color-upload-btn {
            padding: 8px 12px; border: 1px dashed #2e303a; border-radius: 8px;
            background: transparent; color: #a8aab8; cursor: pointer;
            font-size: 12px; white-space: nowrap; transition: all 0.25s;
            align-self: flex-end; margin-bottom: 0;
        }
        .color-row .color-upload-btn:hover { border-color: #e33f3f; color: #e33f3f; }
        .color-row .color-preview {
            width: 48px; height: 48px; object-fit: cover; border-radius: 6px;
            border: 1px solid #2e303a; display: none; align-self: flex-end;
        }
        .color-row .color-preview.show { display: block; }
        .color-row .color-remove-btn {
            position: absolute; top: 8px; right: 8px;
            width: 24px; height: 24px; border-radius: 50%; border: 1px solid #2e303a;
            background: transparent; color: #a8aab8; cursor: pointer;
            font-size: 14px; line-height: 22px; text-align: center;
            transition: all 0.25s; padding: 0;
        }
        .color-row .color-remove-btn:hover { background: #2a1a1a; color: #e74c3c; border-color: #e74c3c; }
        .color-empty { color: #6a6c7a; text-align: center; padding: 12px 0; font-size: 13px; }

        /* ====== Quill 富文本编辑器 ====== */
        .quill-wrapper { margin-bottom: 18px; }
        .quill-wrapper label { display: block; font-weight: 500; font-size: 13px; margin-bottom: 4px; color: #c8c8d8; }
        .quill-editor {
            background: #0b0c10; border: 1px solid #2e303a; border-radius: 10px;
            transition: border-color 0.25s;
        }
        .quill-editor:hover { border-color: #3e404a; }
        .quill-editor:focus-within { border-color: #e33f3f; box-shadow: 0 0 0 3px rgba(227,63,63,0.2); }
        .quill-editor .ql-toolbar.ql-snow {
            border: none; border-bottom: 1px solid #2e303a;
            background: #1d1e26; border-radius: 10px 10px 0 0;
        }
        .quill-editor .ql-toolbar.ql-snow .ql-stroke { stroke: #a8aab8; }
        .quill-editor .ql-toolbar.ql-snow .ql-fill { fill: #a8aab8; }
        .quill-editor .ql-toolbar.ql-snow .ql-picker { color: #a8aab8; }
        .quill-editor .ql-toolbar.ql-snow .ql-picker-options { background: #1d1e26; border-color: #2e303a; }
        .quill-editor .ql-toolbar.ql-snow button:hover .ql-stroke,
        .quill-editor .ql-toolbar.ql-snow button.ql-active .ql-stroke { stroke: #e33f3f; }
        .quill-editor .ql-toolbar.ql-snow button:hover .ql-fill,
        .quill-editor .ql-toolbar.ql-snow button.ql-active .ql-fill { fill: #e33f3f; }
        .quill-editor .ql-toolbar.ql-snow .ql-picker-label:hover,
        .quill-editor .ql-toolbar.ql-snow .ql-picker-label.ql-active { color: #e33f3f; }
        .quill-editor .ql-container.ql-snow {
            border: none; font-family: inherit; font-size: 14px; color: #e8e8f0;
            border-radius: 0 0 10px 10px; min-height: 200px;
        }
        .quill-editor .ql-editor { min-height: 200px; line-height: 1.7; }
        .quill-editor .ql-editor.ql-blank::before { color: #6a6c7a; font-style: normal; }
    </style>
</head>
<body>

<div class="container">
    <h1><img class="admin-icon-lg" src="../Pictures/admin_components/管理员.svg" alt=""> KOOMZE 网站内容管理界面</h1>
    <div class="subtitle">
        先录入「产品基础信息」，再上传各区域的图片内容
        <button id="logoutBtn" style="float:right;padding:4px 14px;border:1px solid #e33f3f;border-radius:14px;background:transparent;color:#e33f3f;cursor:pointer;font-size:12px;transition:all .25s;">🚪 退出登录</button>
    </div>

    <!-- 类型切换标签 -->
    <div class="tabs" id="tabContainer">
        <button class="tab-btn" data-type="product">产品基础信息</button>
        <button class="tab-btn" data-type="home-carousel">主页轮播长图</button>
        <button class="tab-btn" data-type="home-tag">主页标签图</button>
        <button class="tab-btn" data-type="home-mini-carousel">主页小型轮播</button>
        <button class="tab-btn" data-type="product-tag">产品页标签图</button>
        <button class="tab-btn" data-type="product-detail">产品详情页面</button>
        <button class="tab-btn" data-type="driver">驱动文件管理</button>
        <button class="tab-btn" data-type="social">官方账号管理</button>
    </div>

    <!-- 表单区域 -->
    <form id="uploadForm">
        <div id="editIndicator" class="edit-indicator">
            ✏️ 正在编辑：<span id="editItemName"></span>
            <button type="button" class="cancel-edit-btn" id="cancelEditBtn">取消编辑 / 新建</button>
        </div>
        <div id="formFields"><!-- 由 JS 动态渲染 --></div>
        <div class="submit-row">
            <button type="submit" class="btn" id="submitBtn"><img class="admin-icon" src="../Pictures/admin_components/上传.svg" alt="" style="filter:brightness(0)invert(1);"> <span id="submitBtnText">上传</span></button>
            <button type="button" class="btn-cancel" id="cancelEditBtn2" style="display:none;">取消编辑</button>
        </div>
    </form>

    <div id="message"></div>

    <!-- 数据列表 -->
    <div class="list-section">
        <h3 id="listTitle"><img class="admin-icon" src="../Pictures/admin_components/内容系统.svg" alt=""> 已上传内容 <span class="mode-badge create-mode" id="modeBadge" style="margin-left:10px;vertical-align:middle;">➕ 新建模式</span></h3>
        <!-- 搜索/筛选工具栏 — 编辑已上传数据入口 -->
        <div class="list-toolbar" id="listToolbar">
            <input type="text" class="list-search" id="listSearchInput" placeholder="🔍 搜索已上传记录（按产品ID、名称、型号筛选）...">
            <select class="list-filter" id="listFilterSelect">
                <option value="all">全部类型</option>
            </select>
            <span class="list-result-count" id="listResultCount"></span>
        </div>
        <div id="listContainer"><div class="empty">加载中...</div></div>
        <button id="refreshBtn" style="margin-top:12px;padding:8px 16px;background:#2e303a;color:#e8e8f0;border:none;border-radius:8px;cursor:pointer;"><img class="admin-icon" src="../Pictures/admin_components/刷新.svg" alt="" style="filter:brightness(0)invert(1);"> 刷新</button>
    </div>

    <!-- 产品 ID ↔ 名称对照表 -->
    <div class="lookup-section">
        <h3><img class="admin-icon" src="../Pictures/admin_components/搜索.svg" alt=""> 产品 ID ↔ 名称 对照表</h3>
        <div class="lookup-search-row">
            <input type="text" id="lookupInput" placeholder="输入 productId 或产品名称进行搜索...">
            <button id="lookupSearchBtn">搜索</button>
            <button id="lookupClearBtn" class="secondary">显示全部</button>
        </div>
        <div class="lookup-count" id="lookupCount"></div>
        <div style="overflow-x:auto;">
            <table class="lookup-table">
                <thead><tr><th>productId</th><th>产品名称</th><th>分类</th></tr></thead>
                <tbody id="lookupBody"><tr><td colspan="3" style="text-align:center;color:#6a6c7a;">加载中...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ========== 🔐 令牌认证系统 ==========
    // 从 sessionStorage 获取 Bearer 令牌（用于 API 调用）
    // 注意：页面加载时的认证由 HttpOnly Cookie 处理（authGuard 中间件验证）
    // sessionStorage 令牌仅用于 AJAX 请求的 Authorization 头
    const AUTH_TOKEN = sessionStorage.getItem('admin_token');

    /**
     * 带认证的 fetch 封装
     * 优先使用 Bearer 令牌；如无令牌则依赖 Cookie 认证（浏览器自动携带）
     * 自动处理 401 过期 → 清除令牌并跳转登录
     */
    async function authFetch(url, options = {}) {
        const headers = options.headers || {};
        // 如果有 Bearer 令牌，添加到请求头
        if (AUTH_TOKEN) {
            headers['Authorization'] = 'Bearer ' + AUTH_TOKEN;
        }
        // 如果 body 是 FormData，不设置 Content-Type（让浏览器自动设置 multipart boundary）
        if (!(options.body instanceof FormData)) {
            headers['Content-Type'] = headers['Content-Type'] || 'application/json';
        }
        const res = await fetch(url, { ...options, headers });
        // 令牌过期或无效 → 清除令牌并跳转登录
        if (res.status === 401) {
            sessionStorage.removeItem('admin_token');
            try {
                const data = await res.json();
                if (data.needLogin) {
                    alert('登录已过期，请重新登录');
                    window.location.replace('/');
                    throw new Error('需要重新登录');
                }
            } catch (e) {
                if (e.message === '需要重新登录') throw e;
                // 可能是页面导航触发的 401（非 JSON 响应），也跳转登录
                window.location.replace('/');

                html += '<div class="form-group" style="position:relative;"><label>' + f.label + requiredMark + '</label><input type="text" id="field_' + f.key + '" placeholder="' + (f.placeholder||'') + '" ' + (f.required?'required':'') + ' autocomplete="off"><div class="pid-suggest" id="suggest_' + f.key + '"></div><div class="field-hint" id="hint_' + f.key + '" style="color:#2ecc71;display:none;"></div><div class="field-hint">输入产品 ID，下方对照表可查所有 ID ↔ 名称</div></div>';

                html += '<div class="form-group"><label>' + f.label + requiredMark + '</label><select id="field_' + f.key + '" ' + (f.required?'required':'') + '><option value="">-- 请选择 --</option>' + (f.options||[]).map(o => '<option value="' + o + '">' + o + '</option>').join('') + '</select></div>';

            const isDriver = btn.dataset.type === 'driver';
            btn.addEventListener('click', () => isDriver ? triggerFileUpload(btn) : triggerImageUpload(btn));
        });
        // 【修复】绑定图片预览 — 遍历配置中的 image 类型字段，而非依赖固定 id 前缀
        config.fields.filter(f => f.type === 'image').forEach(f => {
            const input = document.getElementById('field_' + f.key);
            const preview = document.getElementById('preview_' + f.key);
            if (input && preview) {
                input.addEventListener('input', () => {
                    const url = input.value.trim();
                    if (url) { preview.src = url; preview.classList.add('show'); }
                    else preview.classList.remove('show');
                });
                // 如果字段已有值（如编辑回填），立即显示预览
                if (input.value.trim()) {
                    preview.src = input.value.trim();
                    preview.classList.add('show');
                }
            }
        });
        // 绑定 productId 自动提示
        document.querySelectorAll('input[id^="field_productId"]').forEach(input => {
            let suggestTimer;
            input.addEventListener('input', () => {
                clearTimeout(suggestTimer);
                const val = input.value.trim();
                const suggestEl = document.getElementById('suggest_productId');
                const hintEl = document.getElementById('hint_productId');
                if (!suggestEl) return;
                if (!val) { suggestEl.classList.remove('show'); if(hintEl)hintEl.style.display='none'; return; }
                if (productMap[val]) {
                    if(hintEl){ hintEl.textContent='已匹配: '+productMap[val].name+'（'+productMap[val].category+'）'; hintEl.style.color='#2ecc71'; hintEl.style.display='block'; }
                    suggestEl.classList.remove('show'); return;
                }
                suggestTimer = setTimeout(() => {
                    const matches = Object.entries(productMap).filter(([id,info]) =>
                        id.toLowerCase().includes(val.toLowerCase()) || info.name.toLowerCase().includes(val.toLowerCase())
                    ).slice(0,6);
                    if (matches.length > 0) {
                        suggestEl.innerHTML = matches.map(([id,info]) =>
                            '<div class="pid-suggest-item" data-pid="' + escapeHtml(id) + '"><span class="sug-id">' + escapeHtml(id) + '</span><span class="sug-name">' + escapeHtml(info.name) + '</span></div>'
                        ).join('');
                        suggestEl.classList.add('show'); if(hintEl)hintEl.style.display='none';
                    } else { suggestEl.classList.remove('show'); if(hintEl){hintEl.textContent='未匹配到产品，请先在「产品基础信息」录入'; hintEl.style.color='#f39c12'; hintEl.style.display='block';} }
                }, 200);
            });
            input.addEventListener('blur', () => { setTimeout(() => { const el = document.getElementById('suggest_productId'); if(el)el.classList.remove('show'); }, 200); });
        });
        // 点击建议项
        document.querySelectorAll('.pid-suggest').forEach(suggestEl => {
            suggestEl.addEventListener('mousedown', e => {
                const item = e.target.closest('.pid-suggest-item');
                if (item) {
                    const input = document.getElementById('field_productId');
                    if (input) { input.value = item.dataset.pid; input.dispatchEvent(new Event('input')); }
                    suggestEl.classList.remove('show');
                }
            });
        });
    }

    // ========== 图片上传 ==========
    function triggerImageUpload(btn) {
        const targetId = btn.dataset.target;
        const fileInput = document.createElement('input');
        fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';
        document.body.appendChild(fileInput);
        fileInput.addEventListener('change', async () => {
            const file = fileInput.files[0];
            if (!file) { document.body.removeChild(fileInput); return; }
            btn.classList.add('uploading'); btn.textContent = '上传中...';
            const formData = new FormData(); formData.append('image', file);
            try {
                const res = await authFetch('/api/content/upload', { method: 'POST', body: formData });
                if (res.ok) {
                    const data = await res.json();
                    const urlInput = document.getElementById(targetId);
                    if (urlInput) { urlInput.value = data.url; urlInput.dispatchEvent(new Event('input')); }
                    btn.classList.remove('uploading'); btn.classList.add('done'); btn.innerHTML = '<img class="admin-icon" src="../Pictures/admin_components/上传.svg" alt="" style="vertical-align:middle;"> 已上传';
                    setTimeout(() => { btn.classList.remove('done'); btn.innerHTML = '<img class="admin-icon" src="../Pictures/admin_components/本地文件夹.svg" alt="" style="vertical-align:middle;"> 本地上传'; }, 3000);
                    showMessage('图片上传成功！', 'success');
                } else {
                    let errMsg = '上传失败（状态码 ' + res.status + '）';
                    try { const errData = await res.json(); errMsg = errData.error || errMsg; } catch(e){}
                    // 检测常见云服务器问题
                    if (res.status === 413) errMsg += ' — 图片可能过大，请压缩后重试，或联系运维调整 Nginx client_max_body_size';
                    throw new Error(errMsg);
                }
            } catch(err) {
                btn.classList.remove('uploading'); btn.innerHTML = '<img class="admin-icon" src="../Pictures/admin_components/本地文件夹.svg" alt="" style="vertical-align:middle;"> 本地上传';
                showMessage((err.message || '图片上传失败，请检查网络或服务器磁盘空间'), 'error');
            }
            document.body.removeChild(fileInput);
        });
        fileInput.click();
    }

    // ========== 驱动文件上传 ==========
    function triggerFileUpload(btn) {
        const targetId = btn.dataset.target;
        const fileInput = document.createElement('input');
        fileInput.type = 'file'; fileInput.accept = '.zip,.rar,.exe,.7z,.gz,.tar,.dmg,.pkg,.msi,.pdf'; fileInput.style.display = 'none';
        document.body.appendChild(fileInput);
        fileInput.addEventListener('change', async () => {
            const file = fileInput.files[0];
            if (!file) { document.body.removeChild(fileInput); return; }
            btn.classList.add('uploading'); btn.textContent = '上传中...';
            const formData = new FormData(); formData.append('file', file);
            try {
                const res = await authFetch('/api/content/upload-driver', { method: 'POST', body: formData });
                if (res.ok) {
                    const data = await res.json();
                    const urlInput = document.getElementById(targetId);
                    if (urlInput) { urlInput.value = data.url; }
                    btn.classList.remove('uploading'); btn.classList.add('done'); btn.innerHTML = '<img class="admin-icon" src="../Pictures/admin_components/上传.svg" alt="" style="vertical-align:middle;"> 已上传';
                    setTimeout(() => { btn.classList.remove('done'); btn.innerHTML = '<img class="admin-icon" src="../Pictures/admin_components/本地文件夹.svg" alt="" style="vertical-align:middle;"> 选择文件'; }, 5000);
                    showMessage('驱动文件上传成功！', 'success');
                } else {
                    let errMsg = '上传失败';
                    try { const errData = await res.json(); errMsg = errData.error || errMsg; } catch(e){}
                    throw new Error(errMsg);
                }
            } catch(err) {
                btn.classList.remove('uploading'); btn.innerHTML = '<img class="admin-icon" src="../Pictures/admin_components/本地文件夹.svg" alt="" style="vertical-align:middle;"> 选择文件';
                showMessage((err.message || '文件上传失败'), 'error');
            }
            document.body.removeChild(fileInput);
        });
        fileInput.click();
    }

    // ========== 颜色动态管理 ==========
    function addColorRow(colorData) {
        const listEl = window._colorListEl || document.getElementById('colorList');
        if (!listEl) return;
        const emptyEl = listEl.querySelector('.color-empty');
        if (emptyEl) emptyEl.remove();

        const row = document.createElement('div');
        row.className = 'color-row';
        row.innerHTML = `
            <div class="color-field" style="flex:2;">
                <label>颜色名称 <span style="color:#e33f3f;">*</span></label>
                <input type="text" class="color-name-input" placeholder="如：星空黑" value="${escapeHtml(colorData?.name || '')}">
            </div>
            <div class="color-field" style="flex:3;">
                <label>颜色图片 URL <span style="color:#e33f3f;">*</span></label>
                <input type="text" class="color-image-input" placeholder="https://... 或点击右侧上传" value="${escapeHtml(colorData?.image || '')}">
            </div>
            <button type="button" class="color-upload-btn">📁 上传</button>
            <img class="color-preview${colorData?.image ? ' show' : ''}" src="${escapeHtml(colorData?.image || '')}" alt="预览">
            <button type="button" class="color-remove-btn" title="删除此颜色">×</button>
        `;
        listEl.appendChild(row);

        row.querySelector('.color-upload-btn').addEventListener('click', function() {
            triggerColorImageUpload(this, row);
        });
        row.querySelector('.color-remove-btn').addEventListener('click', function() {
            row.remove();
            if (listEl.querySelectorAll('.color-row').length === 0) {
                listEl.innerHTML = '<div class="color-empty">暂无颜色，点击「添加颜色」开始</div>';
            }
        });
        const imgInput = row.querySelector('.color-image-input');
        const preview = row.querySelector('.color-preview');
        imgInput.addEventListener('input', function() {
            const url = imgInput.value.trim();
            if (url) { preview.src = url; preview.classList.add('show'); }
            else preview.classList.remove('show');
        });
    }

    function triggerColorImageUpload(btn, row) {
        const fileInput = document.createElement('input');
        fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';
        document.body.appendChild(fileInput);
        fileInput.addEventListener('change', async () => {
            const file = fileInput.files[0];
            if (!file) { document.body.removeChild(fileInput); return; }
            btn.textContent = '⏳'; btn.disabled = true;
            const formData = new FormData(); formData.append('image', file);
            try {
                const res = await authFetch('/api/content/upload', { method: 'POST', body: formData });
                if (res.ok) {
                    const data = await res.json();
                    const imgInput = row.querySelector('.color-image-input');
                    const preview = row.querySelector('.color-preview');
                    if (imgInput) { imgInput.value = data.url; imgInput.dispatchEvent(new Event('input')); }
                    if (preview) { preview.src = data.url; preview.classList.add('show'); }
                    showMessage('颜色图片上传成功！', 'success');
                } else {
                    let errMsg = '上传失败';
                    try { const errData = await res.json(); errMsg = errData.error || errMsg; } catch(e){}
                    throw new Error(errMsg);
                }
            } catch(err) {
                showMessage('颜色图片上传失败: ' + (err.message || '网络错误'), 'error');
            }
            btn.textContent = '📁 上传'; btn.disabled = false;
            document.body.removeChild(fileInput);
        });
        fileInput.click();
    }

    function getColorsData() {
        const rows = document.querySelectorAll('#colorList .color-row');
        const colors = [];
        rows.forEach(row => {
            const name = row.querySelector('.color-name-input')?.value?.trim();
            const image = row.querySelector('.color-image-input')?.value?.trim();
            if (name && image) colors.push({ name, image });
        });
        return colors;
    }

    function setColorsData(colors) {
        const listEl = document.getElementById('colorList');
        if (!listEl) return;
        listEl.innerHTML = '';
        if (!colors || colors.length === 0) {
            listEl.innerHTML = '<div class="color-empty">暂无颜色，点击「添加颜色」开始</div>';
            return;
        }
        colors.forEach(c => addColorRow(c));
    }

    function clearColors() {
        const listEl = document.getElementById('colorList');
        if (!listEl) return;
        listEl.innerHTML = '<div class="color-empty">暂无颜色，点击「添加颜色」开始</div>';
    }

    function getFormData(type) {
        const config = FIELD_CONFIGS[type]; const data = {};
        config.fields.forEach(f => { const el = document.getElementById('field_' + f.key); data[f.key] = el ? el.value.trim() : ''; });
        // 产品详情页专属：收集颜色和介绍
        if (config.hasColors) {
            data.colors = getColorsData();
        }
        if (config.hasIntroduction) {
            data.introduction = getQuillContent();
        }
        return data;
    }

    function resetForm() {
        const config = FIELD_CONFIGS[currentType];
        config.fields.forEach(f => { const el = document.getElementById('field_' + f.key); if (el) el.value = ''; });
        document.querySelectorAll('.img-preview').forEach(img => img.classList.remove('show'));
        document.querySelectorAll('.upload-btn').forEach(btn => {
            const isDriver = btn.dataset.type === 'driver';
            btn.classList.remove('done');
            btn.innerHTML = '<img class="admin-icon" src="../Pictures/admin_components/本地文件夹.svg" alt="" style="vertical-align:middle;"> ' + (isDriver ? '选择文件' : '本地上传');
        });
        document.querySelectorAll('.pid-suggest').forEach(el => el.classList.remove('show'));
        const hintEl = document.getElementById('hint_productId'); if (hintEl) hintEl.style.display = 'none';
        // 清空颜色和 Quill
        if (config.hasColors) clearColors();
        if (config.hasIntroduction) setQuillContent('');
    }

    function showMessage(text, type) {
        messageDiv.textContent = text; messageDiv.className = 'show ' + (type || 'success');
        setTimeout(() => { messageDiv.className = ''; }, 5000);
    }

    // ========== 列表 ==========
    async function loadList(type) {
        listContainer.innerHTML = '<div class="empty">加载中...</div>';
        try {
            const res = await authFetch('/api/content/' + type);
            if (!res.ok) throw new Error('加载失败');
            const data = await res.json();
            cachedListData = data; // 缓存原始数据
            filterAndRenderList(); // 应用搜索筛选后渲染
        } catch(err) { listContainer.innerHTML = '<div class="empty">' + err.message + '</div>'; }
    }

    function renderList(items, type) {
        if (!items || items.length === 0) { listContainer.innerHTML = '<div class="empty">暂无数据，上传第一条吧！</div>'; document.getElementById('listResultCount').textContent = ''; return; }
        const config = FIELD_CONFIGS[type];
        let html = '';
        items.forEach(item => {
            let displayName, displayMeta = '';
            if (type === 'product') {
                displayName = item.name || '未命名';
                displayMeta = 'ID: ' + (item.productId || '') + ' | ' + (item.category || '');
            } else if (type === 'driver') {
                displayName = item.name || '未命名';
                displayMeta = '种类: ' + (item.type || '') + ' | 型号: ' + (item.model || '未填') + ' | 版本: ' + (item.version || '无');
                if (item.webDriverLink) displayMeta += ' | ✅ 已配置网页版驱动'; else displayMeta += ' | ⚠️ 未配置网页版驱动';
            } else if (type === 'social') {
                displayName = item.name || '未命名';
                displayMeta = item.qrImage ? '已上传二维码' : '未上传二维码';
            } else if (type === 'home-mini-carousel') {
                const pid = item.productId || '';
                displayName = item.name || getProductName(pid);
                displayMeta = 'ID: ' + escapeHtml(pid);
                if (item.description) displayMeta += ' | ' + escapeHtml(String(item.description).substring(0, 40));
                if (item.bgImage) displayMeta += ' | 已上传背景图';
                if (item.fgImage) displayMeta += ' | 已上传产品图';
                if (item.order !== undefined && item.order !== null) displayMeta += ' | 排序: ' + item.order;
            } else {
                const pid = item.productId || '';
                displayName = getProductName(pid);
                displayMeta = 'ID: ' + escapeHtml(pid);
                if (item.description) displayMeta += ' | ' + escapeHtml(String(item.description).substring(0, 40));
                if (item.type) displayMeta += ' | ' + escapeHtml(item.type);
                if (item.order !== undefined && item.order !== null) displayMeta += ' | 排序: ' + item.order;
                if (type === 'product-detail' && (item.buyLink1 || item.buyLink2 || item.buyLink3)) displayMeta += ' | 已配置购买链接';
                if (type === 'product-detail' && item.colors && item.colors.length > 0) displayMeta += ' | 🎨 ' + item.colors.length + '种颜色';
                if (type === 'product-detail' && item.introduction) displayMeta += ' | 📝 已填写介绍';
            }
            html += '<div class="item" data-id="' + item._id + '" data-type="' + type + '"><div class="info"><span class="name">' + escapeHtml(displayName) + '</span><span class="meta">' + displayMeta + '</span></div><div class="item-actions"><button class="edit-item-btn" data-id="' + item._id + '" data-type="' + type + '" title="点击编辑此条记录">✏️ 编辑</button><button class="del-btn" data-id="' + item._id + '" data-type="' + type + '" title="删除此条记录"><img class="admin-icon-sm" src="../Pictures/admin_components/删除.svg" alt="删除"></button></div></div>';
        });
        listContainer.innerHTML = html;
        document.getElementById('listResultCount').textContent = '共 ' + items.length + ' 条记录';

        // 【编辑】点击「编辑」按钮进入编辑模式
        document.querySelectorAll('.edit-item-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation(); // 阻止冒泡到 item
                const id = btn.dataset.id;
                const itemType = btn.dataset.type;
                try {
                    const res = await authFetch('/api/content/' + itemType + '/' + id);
                    if (!res.ok) throw new Error('加载失败');
                    const data = await res.json();
                    editingId = data._id;
                    populateForm(itemType, data);
                    // 高亮当前编辑项
                    document.querySelectorAll('.item').forEach(el => el.classList.remove('editing'));
                    const itemEl = document.querySelector('.item[data-id="' + id + '"]');
                    if (itemEl) itemEl.classList.add('editing');
                    // 显示编辑指示器 + 更新模式标识
                    editItemName.textContent = data.name || data.productId || '(未命名)';
                    editIndicator.classList.add('show');
                    submitBtnText.textContent = '更新';
                    cancelEditBtn2.style.display = 'inline-flex';
                    updateModeBadge('edit');
                } catch(err) { showMessage('加载数据失败: ' + err.message, 'error'); }
            });
        });

        // 点击列表项信息区也可进入编辑（保留便捷操作）
        document.querySelectorAll('.item .info').forEach(infoEl => {
            infoEl.style.cursor = 'pointer';
            infoEl.addEventListener('click', async (e) => {
                const itemEl = infoEl.closest('.item');
                if (!itemEl) return;
                const id = itemEl.dataset.id;
                const itemType = itemEl.dataset.type;
                try {
                    const res = await authFetch('/api/content/' + itemType + '/' + id);
                    if (!res.ok) throw new Error('加载失败');
                    const data = await res.json();
                    editingId = data._id;
                    populateForm(itemType, data);
                    document.querySelectorAll('.item').forEach(el => el.classList.remove('editing'));
                    itemEl.classList.add('editing');
                    editItemName.textContent = data.name || data.productId || '(未命名)';
                    editIndicator.classList.add('show');
                    submitBtnText.textContent = '更新';
                    cancelEditBtn2.style.display = 'inline-flex';
                    updateModeBadge('edit');
                } catch(err) { showMessage('加载数据失败: ' + err.message, 'error'); }
            });
        });

        // 如果正在编辑某条记录，高亮对应项
        if (editingId) {
            const activeItem = document.querySelector('.item[data-id="' + editingId + '"]');
            if (activeItem) activeItem.classList.add('editing');
        }

        document.querySelectorAll('.del-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation(); // 阻止冒泡到 item 的编辑事件
                const id = btn.dataset.id, t = btn.dataset.type;
                if (!confirm('确定删除吗？此操作不可恢复。')) return;
                try {
                    const res = await authFetch('/api/content/' + t + '/' + id, { method: 'DELETE' });
                    if (res.ok) {
                        // 如果删除的是正在编辑的记录，退出编辑模式
                        if (editingId === id) cancelEdit();
                        showMessage('删除成功'); await loadProductMap(); loadList(t); refreshLookupTable();
                    }
                    else { const err = await res.json(); showMessage((err.error || '删除失败'), 'error'); }
                } catch(err) { showMessage('网络错误', 'error'); }
            });
        });
    }

    // ========== 搜索/筛选 + 渲染 ==========
    function filterAndRenderList() {
        const searchQuery = (document.getElementById('listSearchInput')?.value || '').trim().toLowerCase();
        const filterType = document.getElementById('listFilterSelect')?.value || 'all';

        let filtered = cachedListData;

        // 按类型筛选（仅当选择了非「全部」时）
        if (filterType !== 'all') {
            filtered = filtered.filter(item => {
                if (currentType === 'driver') return (item.type || '') === filterType;
                if (currentType === 'product') return (item.category || '') === filterType;
                if (currentType === 'product-tag') return (item.type || '') === filterType;
                // 其他类型：尝试用 productId 查产品分类
                const pid = item.productId || '';
                const pInfo = productMap[pid];
                return pInfo && pInfo.category === filterType;
            });
        }

        // 按搜索关键词筛选
        if (searchQuery) {
            filtered = filtered.filter(item => {
                let searchText = '';
                if (currentType === 'product') {
                    searchText = (item.productId || '') + ' ' + (item.name || '') + ' ' + (item.category || '');
                } else if (currentType === 'driver') {
                    searchText = (item.model || '') + ' ' + (item.name || '') + ' ' + (item.type || '') + ' ' + (item.version || '');
                } else if (currentType === 'social') {
                    searchText = (item.name || '');
                } else if (currentType === 'home-mini-carousel') {
                    const pid = item.productId || '';
                    searchText = pid + ' ' + (item.name || '') + ' ' + getProductName(pid) + ' ' + (item.description || '');
                } else {
                    const pid = item.productId || '';
                    searchText = pid + ' ' + getProductName(pid) + ' ' + (item.description || '') + ' ' + (item.type || '');
                }
                return searchText.toLowerCase().includes(searchQuery);
            });
        }

        renderList(filtered, currentType);
        updateFilterOptions();
    }

    // 根据当前类型更新筛选下拉框选项
    function updateFilterOptions() {
        const select = document.getElementById('listFilterSelect');
        if (!select) return;
        const currentVal = select.value;
        let options = [{ value: 'all', label: '全部类型' }];

        if (currentType === 'driver') {
            options.push({ value: '键盘', label: '键盘驱动' }, { value: '鼠标', label: '鼠标驱动' }, { value: '耳机', label: '耳机驱动' });
        } else if (currentType === 'product') {
            options.push({ value: '键盘', label: '键盘类' }, { value: '鼠标', label: '鼠标类' }, { value: '耳机', label: '耳机类' }, { value: '音箱', label: '音箱类' }, { value: '相机', label: '相机类' });
        } else if (currentType === 'product-tag') {
            options.push({ value: '键盘', label: '键盘标签' }, { value: '鼠标', label: '鼠标标签' }, { value: '耳机', label: '耳机标签' }, { value: '音箱', label: '音箱标签' }, { value: '相机', label: '相机标签' });
        } else {
            options.push({ value: '键盘', label: '键盘相关' }, { value: '鼠标', label: '鼠标相关' }, { value: '耳机', label: '耳机相关' }, { value: '音箱', label: '音箱相关' }, { value: '相机', label: '相机相关' });
        }

        select.innerHTML = options.map(o => '<option value="' + o.value + '"' + (o.value === currentVal ? ' selected' : '') + '>' + o.label + '</option>').join('');
    }

    // 更新模式标识（新建 / 编辑）
    function updateModeBadge(mode) {
        const badge = document.getElementById('modeBadge');
        if (!badge) return;
        if (mode === 'edit') {
            badge.textContent = '✏️ 编辑模式';
            badge.className = 'mode-badge edit-mode';
        } else {
            badge.textContent = '➕ 新建模式';
            badge.className = 'mode-badge create-mode';
        }
    }

    // ========== 填充表单（编辑模式） ==========
    function populateForm(type, data) {
        const config = FIELD_CONFIGS[type];
        if (!config) return;
        config.fields.forEach(f => {
            const el = document.getElementById('field_' + f.key);
            if (!el) return;
            const val = data[f.key];
            if (f.type === 'select') {
                el.value = val || '';
            } else {
                el.value = val !== undefined && val !== null ? val : '';
            }
            // 触发图片预览更新
            if (f.type === 'image' && val) {
                el.dispatchEvent(new Event('input'));
            }
        });
        // 重置上传按钮状态
        document.querySelectorAll('.upload-btn').forEach(btn => {
            btn.classList.remove('done');
            const isDriver = btn.dataset.type === 'driver';
            btn.innerHTML = '<img class="admin-icon" src="../Pictures/admin_components/本地文件夹.svg" alt="" style="vertical-align:middle;"> ' + (isDriver ? '选择文件' : '本地上传');
        });
        // 产品详情页专属：回填颜色和介绍
        if (config.hasColors) setColorsData(data.colors || []);
        if (config.hasIntroduction) setQuillContent(data.introduction || '');
    }

    // ========== 取消编辑 ==========
    function cancelEdit() {
        editingId = null;
        editIndicator.classList.remove('show');
        editItemName.textContent = '';
        submitBtnText.textContent = '上传';
        cancelEditBtn2.style.display = 'none';
        updateModeBadge('create');
        document.querySelectorAll('.item').forEach(el => el.classList.remove('editing'));
        document.querySelectorAll('.upload-btn').forEach(btn => {
            btn.classList.remove('done');
            const isDriver = btn.dataset.type === 'driver';
            btn.innerHTML = '<img class="admin-icon" src="../Pictures/admin_components/本地文件夹.svg" alt="" style="vertical-align:middle;"> ' + (isDriver ? '选择文件' : '本地上传');
        });
        // 清理颜色和 Quill
        const config = FIELD_CONFIGS[currentType];
        if (config && config.hasColors) clearColors();
        if (config && config.hasIntroduction) setQuillContent('');
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div'); div.textContent = text; return div.innerHTML;
    }

    // ========== 提交 ==========
    uploadForm.addEventListener('submit', async e => {
        e.preventDefault();
        const data = getFormData(currentType);
        const config = FIELD_CONFIGS[currentType];
        for (const f of config.fields) { if (f.required && !data[f.key]) { showMessage('请填写必填项：' + f.label, 'error'); return; } }
        // 【新增】提交前二次确认小轮播关键字段
        if (currentType === 'home-mini-carousel') {
            if (!data.bgImage || !data.fgImage) {
                showMessage('小轮播需要同时上传「底层背景素材」和「上层产品素材」两张图片', 'error');
                return;
            }
        }
        try {
            let url = '/api/content/' + currentType;
            let method = 'POST';
            if (editingId) {
                url += '/' + editingId;
                method = 'PUT';
            }
            const res = await authFetch(url, {
                method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
            });
            if (res.ok) {
                showMessage(config.label + (editingId ? ' 更新成功！' : ' 上传成功！'));
                cancelEdit(); // 退出编辑模式
                resetForm(); await loadProductMap(); loadList(currentType); refreshLookupTable();
            } else {
                const err = await res.json();
                let errMsg = err.error || '未知错误';
                if (errMsg.includes('ValidationError') || errMsg.includes('字段验证失败')) {
                    errMsg = '数据验证失败：' + errMsg + ' — 请检查所有必填字段是否已填写';
                }
                showMessage((editingId ? '更新' : '上传') + '失败: ' + errMsg, 'error');
            }
        } catch(err) { showMessage('网络请求失败', 'error'); }
    });

    tabContainer.addEventListener('click', e => { const btn = e.target.closest('.tab-btn'); if (btn) switchTab(btn.dataset.type); });
    refreshBtn.addEventListener('click', () => loadList(currentType));

    // 取消编辑按钮
    cancelEditBtn.addEventListener('click', () => { cancelEdit(); resetForm(); });
    cancelEditBtn2.addEventListener('click', () => { cancelEdit(); resetForm(); });

    // ============================================================
    //  产品 ID ↔ 名称 对照表
    // ============================================================
    const lookupInput = document.getElementById('lookupInput');
    const lookupSearchBtn = document.getElementById('lookupSearchBtn');
    const lookupClearBtn = document.getElementById('lookupClearBtn');
    const lookupBody = document.getElementById('lookupBody');
    const lookupCount = document.getElementById('lookupCount');

    function renderLookupTable(products) {
        if (!products || products.length === 0) {
            lookupBody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#6a6c7a;">暂无产品数据，请先在「产品基础信息」中录入</td></tr>';
            lookupCount.textContent = '共 0 个产品';
            return;
        }
        lookupCount.textContent = '共 ' + products.length + ' 个产品';
        lookupBody.innerHTML = products.map(p =>
            '<tr><td><span class="pid">' + escapeHtml(p.productId) + '</span></td><td>' + escapeHtml(p.name) + '</td><td><span class="cat-badge">' + escapeHtml(p.category||'') + '</span></td></tr>'
        ).join('');
    }

    async function searchLookup(query) {
        lookupBody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#6a6c7a;">搜索中...</td></tr>';
        try {
            const res = await authFetch('/api/content/products/search?q=' + encodeURIComponent(query));
            if (res.ok) { const data = await res.json(); renderLookupTable(data); }
        } catch(e) { lookupBody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#e74c3c;">搜索失败</td></tr>'; }
    }

    function refreshLookupTable(query) {
        if (query) { searchLookup(query); return; }
        const products = Object.entries(productMap).map(([id, info]) => ({ productId: id, name: info.name, category: info.category }));
        products.sort((a, b) => a.productId.localeCompare(b.productId));
        renderLookupTable(products);
    }

    lookupSearchBtn.addEventListener('click', () => { const q = lookupInput.value.trim(); q ? searchLookup(q) : refreshLookupTable(); });
    lookupClearBtn.addEventListener('click', () => { lookupInput.value = ''; refreshLookupTable(); });
    lookupInput.addEventListener('keypress', e => { if (e.key === 'Enter') { const q = lookupInput.value.trim(); q ? searchLookup(q) : refreshLookupTable(); } });

    // ========== 启动 ==========
    async function init() {
        await loadProductMap();
        refreshLookupTable();
        // 绑定搜索/筛选事件
        const searchInput = document.getElementById('listSearchInput');
        const filterSelect = document.getElementById('listFilterSelect');
        if (searchInput) {
            searchInput.addEventListener('input', () => filterAndRenderList());
            searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') filterAndRenderList(); });
        }
        if (filterSelect) {
            filterSelect.addEventListener('change', () => filterAndRenderList());
        }
        switchTab('product');
    }
    init();
</script>
</body>
