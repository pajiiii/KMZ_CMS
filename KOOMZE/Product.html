<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>KOOMZE 科曼者 | 产品与驱动</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="common.css">
  <style>
    /* ========== Product Page — Layout ========== */
    .container { max-width:1400px; margin:0 auto; padding:30px 28px; padding-top: calc(30px + var(--topbar-h, 56px)); position:relative; z-index:1; }
    .product-toolbar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; margin-bottom:32px; }
    .cats { display:flex; gap:10px; flex-wrap:wrap; }
    .cat { padding:8px 20px; border:1px solid var(--border); border-radius:6px; cursor:pointer; font-weight:500; background:var(--card); color:var(--text2); transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); font-size:0.9rem; }
    .cat:hover:not(.active) { border-color:var(--theme); color:var(--theme); transform:translateY(-3px); box-shadow:0 6px 20px var(--theme-glow); }
    .cat.active { background:var(--theme); color:#fff; border-color:var(--theme); box-shadow:0 4px 16px var(--theme-glow); }
    .search { display:flex; border:1px solid var(--border); border-radius:6px; overflow:hidden; background:var(--card); transition:border-color 0.25s; }
    .search:focus-within { border-color:var(--theme); box-shadow:0 0 16px var(--theme-glow); }
    .search input { border:none; outline:none; padding:10px 18px; width:240px; background:transparent; color:var(--text); font-size:0.9rem; }
    .search input::placeholder { color:var(--text3); }
    .search button { background:var(--theme); color:#fff; border:none; padding:0 22px; cursor:pointer; font-weight:600; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); font-size:0.9rem; }
    .search button:hover { background:var(--theme2); transform:scale(1.05); }

    /* ========== Product Page — Product Grid ========== */
    .product-list { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:24px; }
    .product {
      background:var(--card); backdrop-filter:blur(4px); border-radius:0; overflow:hidden; cursor:pointer;
      border:1px solid var(--border); transition:0.3s; position:relative;
    }
    .product:hover { transform:translateY(-6px); box-shadow:0 20px 40px rgba(0,0,0,0.4); border-color:var(--theme); }
    .product img { width:100%; height:240px; object-fit:cover; display:block; background:#e8e8ec; transition:transform 0.5s; }
    .product:hover img { transform:scale(1.03); }
    .product .name {
      position:absolute; bottom:12px; left:50%; transform:translateX(-50%); padding:7px 18px; text-align:center; font-weight:600; font-size:0.82rem;
      background:rgba(0,0,0,0.3); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); color:#fff; border-radius:6px; white-space:nowrap; letter-spacing:0.3px;
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1); pointer-events:none;
    }
    .product:hover .name {
      background:rgba(255,55,55,0.82); transform:translateX(-50%) scale(1.08); letter-spacing:0.8px;
      box-shadow:0 0 24px rgba(255,55,55,0.6); padding:8px 22px;
    }

    /* ========== Product Page — Drivers ========== */
    .driver-section { margin-bottom: 48px; }
    .driver-section-title {
      font-size: 1.5rem; font-weight: 700; color: var(--text);
      margin-bottom: 20px; padding-bottom: 10px;
      border-bottom: 2px solid var(--theme);
      display: flex; align-items: center; gap: 10px;
    }
    .driver-section-title::before {
      content: ''; display: inline-block; width: 6px; height: 24px;
      background: var(--theme); border-radius: 3px;
    }
    .driver-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .driver {
      background: var(--card); border: 1px solid var(--border); padding: 24px 18px 18px;
      border-radius: 0; transition: 0.3s; backdrop-filter: blur(4px);
      display: flex; flex-direction: column; gap: 12px;
    }
    .driver:hover { border-color: var(--border2); box-shadow: 0 12px 30px var(--shadow); transform: translateY(-4px); }
    .driver-model {
      font-size: 0.8rem; font-weight: 600; color: var(--theme);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .driver-name { font-size: 1.1rem; font-weight: 700; color: var(--text); line-height: 1.3; }
    .driver-meta { display: flex; flex-direction: column; gap: 6px; font-size: 0.82rem; color: var(--text2); }
    .driver-meta .meta-row { display: flex; align-items: baseline; gap: 6px; }
    .driver-meta .meta-label { font-weight: 600; color: var(--text3); white-space: nowrap; }
    .driver-meta .meta-value { color: var(--text2); word-break: break-all; }
    .driver-actions { display: flex; gap: 10px; margin-top: auto; flex-wrap: wrap; }
    .dl-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 20px; background: var(--theme); color: #fff; border-radius: 6px;
      text-decoration: none; font-weight: 600; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      font-size: 0.85rem; box-shadow: 0 4px 14px var(--shadow); border: none; cursor: pointer;
      white-space: nowrap;
    }
    .dl-btn:hover { background: var(--theme2); box-shadow: 0 6px 22px var(--theme-glow); transform: translateY(-3px) scale(1.03); }
    .dl-btn.web-btn {
      background: transparent; color: var(--theme); border: 1px solid var(--theme);
      box-shadow: none;
    }
    .dl-btn.web-btn:hover { background: var(--theme); color: #fff; box-shadow: 0 6px 22px var(--theme-glow); }
    .dl-btn img { width: 16px; height: 16px; object-fit: contain; }
    .dl-btn:not(.web-btn) img { filter: brightness(0) invert(1); }
    .dl-btn.web-btn img { filter: none; }
    .driver-empty {
      text-align: center; padding: 60px 20px; color: var(--text2); grid-column: 1 / -1;
    }

    /* 驱动页响应式 */
    @media (max-width: 1100px) { .driver-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 800px)  { .driver-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px)  { .driver-grid { grid-template-columns: 1fr; } }

    /* ========== Product Page — Entry Animations ========== */
    .product-toolbar { animation: fadeInUp 0.5s ease both; }
    .product { animation: fadeInUp 0.5s ease both; }
    .product:nth-child(1){animation-delay:0s} .product:nth-child(2){animation-delay:0.06s} .product:nth-child(3){animation-delay:0.12s} .product:nth-child(4){animation-delay:0.18s}
    .product:nth-child(5){animation-delay:0.24s} .product:nth-child(6){animation-delay:0.3s} .product:nth-child(7){animation-delay:0.36s} .product:nth-child(8){animation-delay:0.42s}
    .product:nth-child(n+9){animation-delay:0.48s}
    .driver-section { animation: fadeInUp 0.5s ease both; }
    .driver { animation: fadeInUp 0.5s ease both; }
    .driver:nth-child(1){animation-delay:0s} .driver:nth-child(2){animation-delay:0.06s}
    .driver:nth-child(3){animation-delay:0.12s} .driver:nth-child(4){animation-delay:0.18s}
  </style>
</head>
<body>

<div class="top-bar scrolled" id="topBar">

        <input type="text" id="searchInput" class="lang-zh" placeholder="搜索产品型号 / 关键词">

<script src="common.js"></script>
<script>
  let PRODUCTS = [];
  let DRIVERS = [];
  let productNameMap = {}; // productId → name

  function buildProductNameMap(products) {
    if (products && products.length > 0) {
      productNameMap = {};
      products.forEach(p => { productNameMap[p.productId] = p.name; });
    }
  }

  function resolveProductName(item, fallbackKey) {
    const pid = item.productId || item.pid || '';
    if (productNameMap[pid]) return productNameMap[pid];
    return item[fallbackKey] || pid || '未命名';
  }

  // 从 API 拉产品标签列表，可选按分类筛选
  async function initProducts(category) {
    try {
      const apiUrl = category
        ? '/api/content/product-tag?category=' + encodeURIComponent(category)
        : '/api/content/product-tag';
      const res = await fetch(apiUrl);
      if (!res.ok) { PRODUCTS = []; return; }
      const data = await res.json();
      if (!data || data.length === 0) { PRODUCTS = []; return; }
      const catMap = { '键盘':'keyboard','鼠标':'mouse','耳机':'earphone','音箱':'speaker','相机':'camera' };
      PRODUCTS = data.map(item => {
        const pid = item.productId || '';
        const name = productNameMap[pid] || pid;
        const cat = item.type || '';
        return {
          id: pid, pid: pid,
          cat: catMap[cat] || cat || '',
          img: item.image,
          name_zh: name, name_tw: name, name_en: name
        };
      });
    } catch (e) { PRODUCTS = []; }
  }

  async function loadDrivers() {
    try {
      const res = await fetch('/api/content/driver');
      if (res.ok) {
        const data = await res.json();
        if (data && data.length > 0) {
          DRIVERS = data.map(d => ({
            id: d._id, type: d.type, model: d.model || '',
            name: d.name, version: d.version,
            description: d.description || '',
            file: d.file,
            webDriverLink: d.webDriverLink || ''
          }));
          return;
        }
      }
    } catch(e) {}
    DRIVERS = [];
  }

  let currentView = 'product', currentCategory = 'all', searchKeyword = '';

  function getProductName(p) {
    const pid = p.pid || p.productId || '';
    if (productNameMap[pid]) return productNameMap[pid];
    return p['name_'+(currentLang==='zh-CN'?'zh':currentLang==='zh-TW'?'tw':'en')] || pid;
  }
  function getDriverName(d) { return d.name || ''; }
  function getDriverDesc(d) { return d.description || ''; }

  function renderProducts() {
    const container = document.getElementById('productList');
    let filtered = PRODUCTS.filter(p => {
      if (currentCategory !== 'all' && p.cat !== currentCategory) return false;
      if (searchKeyword && !getProductName(p).toLowerCase().includes(searchKeyword.toLowerCase())) return false;
      return true;
    });
    if (!filtered.length) {
      container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text2);">✨ <span class="lang-zh">没有找到相关产品</span><span class="lang-tw">沒有找到相關產品</span><span class="lang-en">No products found</span></div>';
      return;
    }
    container.innerHTML = filtered.map(p => {
      const pid = p.pid || p.id || '';
      return '<div class="product" data-product-id="' + pid + '"><img src="' + p.img + '" alt="' + getProductName(p) + '" onerror="this.src=\'https://placehold.co/400x240?text=KOOMZE\'"><div class="name">' + getProductName(p) + '</div></div>';
    }).join('');
    document.querySelectorAll('.product').forEach(el => el.addEventListener('click', () => {
      window.location.href = 'product-detail.html?id=' + encodeURIComponent(el.dataset.productId);
    }));
  }

  function renderDrivers() {
    const container = document.getElementById('driverContainer');
    if (!container) return;
    const typeOrder = ['键盘', '鼠标', '耳机'];
    const typeLabels = {
      '键盘': { zh: '<img src="Pictures/components/键盘.svg" alt="" style="width:24px;height:24px;vertical-align:middle;margin-right:6px;">键盘驱动', tw: '<img src="Pictures/components/键盘.svg" alt="" style="width:24px;height:24px;vertical-align:middle;margin-right:6px;">鍵盤驅動', en: '<img src="Pictures/components/键盘.svg" alt="" style="width:24px;height:24px;vertical-align:middle;margin-right:6px;">Keyboard Drivers' },
      '鼠标': { zh: '<img src="Pictures/components/鼠标滚轮.svg" alt="" style="width:24px;height:24px;vertical-align:middle;margin-right:6px;">鼠标驱动', tw: '<img src="Pictures/components/鼠标滚轮.svg" alt="" style="width:24px;height:24px;vertical-align:middle;margin-right:6px;">滑鼠驅動', en: '<img src="Pictures/components/鼠标滚轮.svg" alt="" style="width:24px;height:24px;vertical-align:middle;margin-right:6px;">Mouse Drivers' },
      '耳机': { zh: '<img src="Pictures/components/耳机.svg" alt="" style="width:24px;height:24px;vertical-align:middle;margin-right:6px;">耳机驱动', tw: '<img src="Pictures/components/耳机.svg" alt="" style="width:24px;height:24px;vertical-align:middle;margin-right:6px;">耳機驅動', en: '<img src="Pictures/components/耳机.svg" alt="" style="width:24px;height:24px;vertical-align:middle;margin-right:6px;">Headset Drivers' }
    };
    const groups = {};
    typeOrder.forEach(t => { groups[t] = []; });
    DRIVERS.forEach(d => {
      const t = d.type || '键盘';
      if (groups[t]) groups[t].push(d); else groups[t] = [d];
    });

    const dlIcon = '<img class="nav-icon" src="Pictures/components/下载.svg" alt="">';
    const webIcon = '<img class="nav-icon" src="Pictures/components/查看.svg" alt="">';
    const langKey = currentLang === 'zh-TW' ? 'tw' : (currentLang === 'en' ? 'en' : 'zh');

    let html = '';
    typeOrder.forEach(type => {
      const items = groups[type] || [];
      if (items.length === 0) return;
      const label = (typeLabels[type] && typeLabels[type][langKey]) || type;
      html += '<div class="driver-section"><div class="driver-section-title">' + label + '</div><div class="driver-grid">';
      items.forEach(d => {
        const model = d.model || '', name = getDriverName(d), version = d.version || '', desc = getDriverDesc(d);
        const webLink = d.webDriverLink || '', fileLink = d.file || d.link || '';
        const modelHTML = model ? '<div class="driver-model">' + model + '</div>' : '';
        const versionRow = version ? '<div class="meta-row"><span class="meta-label">版本：</span><span class="meta-value">' + version + '</span></div>' : '';
        const descRow = desc ? '<div class="meta-row"><span class="meta-label">说明：</span><span class="meta-value">' + desc + '</span></div>' : '';
        html += '<div class="driver">' + modelHTML + '<div class="driver-name">' + name + '</div><div class="driver-meta">' + descRow + versionRow + '</div><div class="driver-actions"><a href="' + fileLink + '" class="dl-btn" download>' + dlIcon + ' <span class="lang-zh">立即下载</span><span class="lang-tw">立即下載</span><span class="lang-en">Download</span></a>' + (webLink ? '<a href="' + webLink + '" class="dl-btn web-btn" target="_blank" rel="noopener">' + webIcon + ' <span class="lang-zh">网页版驱动</span><span class="lang-tw">網頁版驅動</span><span class="lang-en">Web Driver</span></a>' : '') + '</div></div>';
      });
      html += '</div></div>';
    });
    if (!html) {
      html = '<div class="driver-empty"><span class="lang-zh">📦 还未上传驱动文件</span><span class="lang-tw">📦 還未上傳驅動文件</span><span class="lang-en">📦 No driver files uploaded yet</span></div>';
    }
    container.innerHTML = html;
  }

  const CATEGORY_META = [
    { key:"all", name_zh:"所有", name_tw:"所有", name_en:"All" },
    { key:"keyboard", name_zh:"键盘", name_tw:"鍵盤", name_en:"Keyboard" },
    { key:"mouse", name_zh:"鼠标", name_tw:"滑鼠", name_en:"Mouse" },
    { key:"earphone", name_zh:"耳机", name_tw:"耳機", name_en:"Earphone" },
    { key:"speaker", name_zh:"音箱/CD机", name_tw:"喇叭", name_en:"Speaker/CD" },
    { key:"camera", name_zh:"相机", name_tw:"相機", name_en:"Camera" }
  ];

  function setupCategories() {
    const catsContainer = document.getElementById('catsContainer');
    catsContainer.innerHTML = CATEGORY_META.map(cat =>
      '<div class="cat ' + (currentCategory===cat.key?'active':'') + '" data-cat="' + cat.key + '"><span class="lang-zh">' + cat.name_zh + '</span><span class="lang-tw">' + cat.name_tw + '</span><span class="lang-en">' + cat.name_en + '</span></div>'
    ).join('');
    document.querySelectorAll('.cat').forEach(el => el.addEventListener('click', async () => {
      document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      currentCategory = el.dataset.cat;
      const url = new URL(window.location);
      if (currentCategory === 'all') { url.searchParams.delete('category'); }
      else { url.searchParams.set('category', currentCategory); }
      window.history.replaceState({}, '', url);
      if (currentView === 'product') {
        await initProducts(currentCategory !== 'all' ? currentCategory : null);
        renderProducts();
      }
    }));
  }

  function setView(view) {
    currentView = view;
    document.getElementById('productPage').style.display = view === 'product' ? 'block' : 'none';
    document.getElementById('driverPage').style.display = view === 'driver' ? 'block' : 'none';
    const driverNav = document.getElementById('driverNav');
    if (view === 'product') { if(driverNav) driverNav.classList.remove('active'); renderProducts(); }
    else { if(driverNav) driverNav.classList.add('active'); renderDrivers(); }
  }

  async function refreshUI() {
    await initProducts(currentCategory !== 'all' ? currentCategory : null);
    document.getElementById('searchInput').style.display = currentLang==='zh-CN'?'block':'none';
    document.getElementById('searchInputTw').style.display = currentLang==='zh-TW'?'block':'none';
    document.getElementById('searchInputEn').style.display = currentLang==='en'?'block':'none';
    if (currentView === 'product') { renderProducts(); setupCategories(); } else renderDrivers();
  }

  function hideLoader() {
    const loader = document.getElementById('pageLoader');
    if (loader) { loader.classList.add('hidden'); }
  }

  window.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(window.location.search);
    const viewParam = params.get('view');
    const catParam = params.get('category');
    if (catParam) { currentCategory = catParam; }

    // ⚡ 只请求一次产品列表，复用于名称映射和导航下拉
    const products = await fetchProducts();
    buildProductNameMap(products);

    // ⚡ 并行加载：产品标签 + 驱动 + 社交信息（产品数据已获取，无需再等）
    await Promise.all([
      initProducts(currentCategory !== 'all' ? currentCategory : null),
      loadDrivers()
    ]);

    initCommon(function() { refreshUI(); });
    setView(viewParam === 'driver' ? 'driver' : 'product');
    setupCategories();

    // ⚡ 传入已获取的产品数据，避免 initDynamicNav 重复请求
    initDynamicNav(products);
    initFooterSocial();

    // 绑定搜索事件
    document.getElementById('searchBtn').addEventListener('click', () => {
      let input = document.getElementById(currentLang==='zh-CN'?'searchInput':currentLang==='zh-TW'?'searchInputTw':'searchInputEn');
      searchKeyword = input ? input.value.trim() : '';
      if (currentView === 'product') renderProducts();
    });
    ['searchInput','searchInputTw','searchInputEn'].forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.addEventListener('input', e => { searchKeyword = e.target.value.trim(); if(currentView==='product') renderProducts(); });
        el.addEventListener('keypress', e => { if(e.key==='Enter'){ searchKeyword = e.target.value.trim(); if(currentView==='product') renderProducts(); } });
      }
    });

    // 🔥 内容加载完毕，隐藏加载动画
    hideLoader();
  });
</script>
</body>
</html>
