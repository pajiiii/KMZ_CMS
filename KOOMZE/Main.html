<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KOOMZE 科曼者 | 电竞外设官网</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* ========== Main Page — Hero Wrapper ========== */
        .hero-section { width: 100%; display: flex; flex-direction: column; position: relative; z-index: 1; }

        /* ========== Main Page — Carousel ========== */
        .carousel-section { width: 100%; position: relative; z-index: 1; }
        .carousel-window {
            width: 100%; overflow: hidden; border-radius: 0;
            border: 1px solid var(--border); background: var(--card);
            box-shadow: 0 24px 60px rgba(0,0,0,0.12);
        }
        .carousel-track { display: flex; transition: transform 0.6s ease; }
        .carousel-slide { flex: 0 0 100%; position: relative; aspect-ratio: 16 / 9; }
        .carousel-slide img {
            width: 100%; height: 100%; object-fit: cover; display: block;
            transition: transform 0.6s ease;
        }
        .carousel-slide:hover img { transform: scale(1.02); }
        .carousel-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: flex-end; padding: 36px 34px 40px;
            background: linear-gradient(180deg, transparent 42%, rgba(8, 9, 13, 0.82) 94%);
            opacity: 1; transform: translateY(0);
            pointer-events: auto;
        }
        .carousel-title {
            color: #fff; font-size: clamp(1.8rem, 3vw, 2.8rem); font-weight: 800;
            margin-bottom: 16px; letter-spacing: 0.5px;
        }
        .carousel-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            padding: 8px 18px; border-radius: 6px; border: none;
            background: transparent; color: #fff; text-decoration: none;
            font-weight: 500; letter-spacing: 0.3px; font-size: 0.85rem;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .carousel-btn img { width: 18px; height: 18px; object-fit: contain; filter: brightness(0) invert(1); }
        .carousel-btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .carousel-desc { font-size: 0.85rem; color: rgba(255,255,255,0.75); margin-bottom: 10px; font-weight: 400; }
        .carousel-indicators { display: flex; justify-content: center; gap: 10px; margin-top: 16px; }
        .carousel-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 40px; height: 40px; border: none; border-radius: 50%;
            background: transparent; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease;
            z-index: 2; opacity: 0.7;
        }
        .carousel-arrow img { width: 36px; height: 36px; object-fit: contain; filter: brightness(0) invert(1) drop-shadow(0 1px 3px rgba(0,0,0,0.4)); }
        .carousel-arrow:hover { opacity: 1; transform: translateY(-50%) scale(1.15); }
        .carousel-arrow--prev { left: 12px; }
        .carousel-arrow--next { right: 12px; }
        .carousel-indicator {
            width: 12px; height: 12px; border-radius: 50%; border: 1px solid var(--border2);
            background: rgba(0,0,0,0.08); cursor: pointer;
            transition: transform 0.25s ease, background 0.25s ease;
        }
        .carousel-indicator.active { background: var(--text); transform: scale(1.15); }

        /* ========== Main Page — Feature Cards ========== */
        .feature-section {
            width: 100%; padding: 28px 2% 42px; position: relative; z-index: 1;
            display: grid; gap: 18px;
        }
        .feature-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
        .feature-card {
            position: relative; display: block; overflow: hidden; border-radius: 0;
            min-height: 260px; border: 1px solid var(--border); background: var(--card);
        }
        .feature-card img {
            width: 100%; height: 100%; object-fit: cover; display: block;
            transition: transform 0.5s ease;
        }
        .feature-card:hover img { transform: scale(1.05); }
        .feature-card-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center; padding: 5% 20px 20px; pointer-events: none;
            background: linear-gradient(180deg, transparent 35%, rgba(8,9,13,0.9) 100%);
        }
        .feature-title {
            color: #fff; font-size: clamp(2.2rem, 2.0vw, 3rem); font-weight: 300;
            letter-spacing: 0.5px; text-align: center; pointer-events: auto; max-width: 90%; line-height: 1.3;
            text-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }
        .feature-card-info {
            display: flex; flex-direction: column; gap: 10px; width: 100%; pointer-events: auto;
        }
        .feature-card-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            margin-top: auto; margin-bottom: 4px;
            padding: 8px 18px; border-radius: 6px; border: none;
            background: transparent; color: #fff; font-weight: 500;
            font-size: 0.85rem; letter-spacing: 0.4px; text-decoration: none; pointer-events: auto;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .feature-card-btn img { width: 17px; height: 17px; object-fit: contain; filter: brightness(0) invert(1); }
        .feature-card-btn:hover { opacity: 0.85; transform: translateY(-1px); }

        /* ========== Main Page — Mini Carousel (产品穿出卡片) ========== */
        .mini-carousel-section {
            width: 100%; padding: 0 5% 0; position: relative; z-index: 1;
            margin-bottom: 0; display: none; /* 默认隐藏，有数据时 JS 显示 */
        }
        .mini-carousel-section.has-data { display: block; }
        .mini-carousel-window {
            width: 100%; overflow: hidden; position: relative;
            border-radius: 0; background: transparent;
        }
        .mini-carousel-track {
            display: flex; transition: transform 0.5s ease;
            align-items: flex-end; /* 底部对齐，保证卡片底部一致 */
        }
        .mini-carousel-slide {
            flex: 0 0 33.333%; min-width: 280px;
            position: relative; padding: 0 10px;
            box-sizing: border-box;
        }
        .mini-card {
            position: relative; width: 100%; height: 500px;
            overflow: visible; /* 允许上层产品图溢出 */
            border: 1px solid var(--border);
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: 0 12px 40px var(--shadow);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
        }
        .mini-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 56px var(--shadow-lg);
        }
        /* 底层背景素材 */
        .mini-card-bg {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; display: block; border-radius: var(--radius);
        }
        /* 上层产品素材 — 底部对齐，顶部可溢出 */
        .mini-card-fg {
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: auto; max-width: 110%;
            height: auto; max-height: none; /* 不限制高度，允许溢出 */
            object-fit: contain; display: block;
            z-index: 2; pointer-events: none;
        }
        /* 信息叠加层 */
        .mini-card-info {
            position: absolute; inset: 0; z-index: 3;
            display: flex; flex-direction: column;
            justify-content: flex-start;
            padding: 24px 20px 16px;
            pointer-events: none;
        }
        .mini-card-name {
            color: #fff; font-size: clamp(1.4rem, 2.2vw, 2rem);
            font-weight: 700; letter-spacing: 0.4px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.55);
            margin-bottom: 6px; pointer-events: auto;
            line-height: 1.25;
        }
        .mini-card-desc {
            font-size: 0.82rem; color: rgba(255,255,255,0.72);
            font-weight: 400; letter-spacing: 0.2px;
            text-shadow: 0 1px 6px rgba(0,0,0,0.5);
            pointer-events: auto; margin-bottom: auto;
        }
        .mini-card-btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 6px; align-self: flex-end; margin-top: auto;
            padding: 8px 18px; border-radius: 6px; border: none;
            background: transparent; color: #fff; font-weight: 500;
            font-size: 0.85rem; letter-spacing: 0.4px; text-decoration: none;
            pointer-events: auto;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .mini-card-btn img {
            width: 17px; height: 17px; object-fit: contain;
            filter: brightness(0) invert(1);
        }
        .mini-card-btn:hover { opacity: 0.85; transform: translateY(-1px); }

        /* 小型轮播箭头 */
        .mini-carousel-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 36px; height: 36px; border: none; border-radius: 50%;
            background: rgba(255,255,255,0.15); cursor: pointer;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease, background 0.25s ease;
            z-index: 5; opacity: 0.75;
        }
        .mini-carousel-arrow img {
            width: 28px; height: 28px; object-fit: contain;
            filter: brightness(0) invert(1) drop-shadow(0 1px 3px rgba(0,0,0,0.4));
        }
        .mini-carousel-arrow:hover {
            opacity: 1; background: rgba(255,255,255,0.3);
            transform: translateY(-50%) scale(1.12);
        }
        .mini-carousel-arrow--prev { left: 0; }
        .mini-carousel-arrow--next { right: 0; }

        /* 小型轮播指示器 */
        .mini-carousel-indicators {
            display: flex; justify-content: center; gap: 8px; margin-top: 14px;
        }
        .mini-carousel-indicator {
            width: 10px; height: 10px; border-radius: 50%;
            border: 1px solid var(--border2);
            background: rgba(0,0,0,0.08); cursor: pointer;
            transition: transform 0.25s ease, background 0.25s ease;
        }
        .mini-carousel-indicator.active {
            background: var(--text); transform: scale(1.18);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .mini-carousel-slide { flex: 0 0 85%; min-width: 240px; }
            .mini-card { height: 350px; }
            .mini-card-name { font-size: 1.1rem; }
            .mini-card-desc { font-size: 0.72rem; }
        }

        /* ========== Main Page — Media Queries & Animations ========== */
        @media (max-width: 760px) {
            .feature-grid { grid-template-columns: 1fr; }
            .feature-section { padding: 20px 2% 32px; }
        }

        /* ========== Main Page — Page Loader ========== */
        .page-loader {
            position: fixed; inset: 0; z-index: 10000;
            background: #ffffff;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.2s;
        }
        .page-loader.hidden {
            opacity: 0; visibility: hidden; pointer-events: none;
        }
        .loader-image {
            max-width: 80%;
            max-height: 50%;
            object-fit: contain;
            animation: loaderFadeIn 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes loaderFadeIn {
            0%   { opacity: 0; transform: scale(0.92); }
            30%  { opacity: 1; transform: scale(1); }
            100% { opacity: 1; transform: scale(1); }
        }
        .carousel-section { animation: fadeIn 0.6s ease both; }
        .mini-carousel-section.has-data { animation: fadeInUp 0.5s ease both; }
        .feature-card { animation: fadeInUp 0.5s ease both; }
        .feature-card:nth-child(1){animation-delay:0.05s} .feature-card:nth-child(2){animation-delay:0.1s}
        .feature-card:nth-child(3){animation-delay:0.15s} .feature-card:nth-child(4){animation-delay:0.2s}
        .feature-card:nth-child(5){animation-delay:0.25s} .feature-card:nth-child(6){animation-delay:0.3s}
        .feature-card:nth-child(7){animation-delay:0.35s} .feature-card:nth-child(8){animation-delay:0.4s}
    </style>
</head>

<script src="common.js"></script>
<script>
    // ========== 数据获取层 ==========
    // 优先从 API 加载，失败或无数据时用硬编码兜底
    // 兜底数据格式：{ pid: 产品ID, img, title, description }
    const CAROUSEL_FALLBACK = [
        { pid: "H75", img: "Pictures/官网长图/H75.png",    title: "H75键盘", description: "" },
        { pid: "M7",  img: "Pictures/官网长图/画板 1.png",  title: "M7鼠标",  description: "" },
        { pid: "K9pAI",img: "Pictures/官网长图/画板 2.png",  title: "K9pAI耳机",description: "" },
        { pid: "S9",  img: "Pictures/官网长图/画板 3.png",  title: "S9音箱",  description: "" },
        { pid: "CD",  img: "Pictures/官网长图/画板 4.png",  title: "CD机",    description: "" }
    ];
    const FEATURES_FALLBACK = [
        { pid: "C25", img: "Pictures/官网小标签图/CCD相机.png",       title: "C25相机" },
        { pid: "CD",  img: "Pictures/官网小标签图/CD机.png",          title: "CD机" },
        { pid: "H75", img: "Pictures/官网小标签图/H75键盘.png",       title: "H75键盘" },
        { pid: "K1",  img: "Pictures/官网小标签图/K1头戴式耳机.png",   title: "K1耳机" },
        { pid: "K9pAI",img: "Pictures/官网小标签图/K9＋AI款.png",      title: "K9pAI耳机" },
        { pid: "M7",  img: "Pictures/官网小标签图/M7鼠标.png",        title: "M7鼠标" },
        { pid: "S6",  img: "Pictures/官网小标签图/S6.png",           title: "S6音箱" },
        { pid: "S9",  img: "Pictures/官网小标签图/S9.png",           title: "S9音箱" }
    ];

    let CAROUSEL_ITEMS = [];
    let CAROUSEL_REAL_SLIDE_COUNT = 0;
    let productNameMap = {}; // productId → name

    async function fetchFromAPI(endpoint) {
        try {
            const res = await fetch(endpoint);
            if (!res.ok) return null;
            const data = await res.json();
            return (data && data.length > 0) ? data : null;
        } catch (e) { console.log('API 不可用，使用本地兜底数据: ' + endpoint); return null; }
    }

    // 构建 productId → 产品名称 映射表
    async function buildProductNameMap() {
        const products = await fetchFromAPI('/api/content/product');
        if (products) {
            productNameMap = {};
            products.forEach(p => { productNameMap[p.productId] = p.name; });
        }
    }

    // 通过 productId 获取产品名称，兜底使用 item 自带 title
    function resolveName(item, fallbackTitle) {
        const pid = item.productId || item.pid || '';
        return productNameMap[pid] || fallbackTitle || pid || 'KOOMZE';
    }

    // 初始化所有数据
    async function initData() {
        const [carouselData, featuresData] = await Promise.all([
            fetchFromAPI('/api/content/home-carousel'),
            fetchFromAPI('/api/content/home-tag')
        ]);
        await buildProductNameMap();

        // 轮播数据：API 数据 → 统一格式，名称通过 productId 查找
        if (carouselData) {
            CAROUSEL_ITEMS = carouselData.map(item => ({
                id: item._id,
                pid: item.productId,
                img: item.image,
                title: resolveName(item, ''),
                description: item.description || '',
                link: 'product-detail.html?id=' + encodeURIComponent(item.productId || '')
            }));
        } else {
            CAROUSEL_ITEMS = CAROUSEL_FALLBACK.map(item => ({
                id: item.pid, pid: item.pid, img: item.img,
                title: item.title, description: item.description || '',
                link: 'product-detail.html?id=' + encodeURIComponent(item.pid)
            }));
        }
        CAROUSEL_REAL_SLIDE_COUNT = CAROUSEL_ITEMS.length;

        // 产品卡片数据
        if (featuresData) {
            renderFeatureCards(featuresData.map(item => ({
                pid: item.productId,
                img: item.image,
                title: resolveName(item, ''),
                description: item.description || ''
            })));
        } else {
            renderFeatureCards(FEATURES_FALLBACK.map(item => ({
                pid: item.pid, img: item.img,
                title: item.title, description: item.description || ''
            })));
        }
    }

    // 渲染产品卡片区域（feature grid）
    function renderFeatureCards(items) {
        const grid = document.getElementById('featureGrid');
        if (!grid) return;
        grid.innerHTML = items.map((item, i) => {
            const img = item.img || item.image || '';
            const title = item.title || '';
            const pid = item.pid || item.productId || '';
            const desc = item.description || '';
            const link = 'product-detail.html?id=' + encodeURIComponent(pid);
            const delay = (i * 0.05).toFixed(2);
            const descHTML = desc ? `<span style="display:block;font-size:0.55em;font-weight:400;opacity:0.7;margin-top:2px;">${desc}</span>` : '';
            return `
                <a class="feature-card" href="${link}" style="animation-delay:${delay}s">
                    <img src="${img}" alt="${title}" onerror="this.src='https://placehold.co/600x600/12141d/e8e9f0?text=${encodeURIComponent(title)}'">
                    <div class="feature-card-overlay">
                        <span class="feature-title">${title}${descHTML}</span>
                        <span class="feature-card-btn"><img src="Pictures/components/查看.svg" alt="">查看详情</span>
                    </div>
                </a>
            `;
        }).join('');
    }

    // ========== 小型叠加轮播（产品穿出卡片效果） ==========
    let MINI_CAROUSEL_ITEMS = [];
    let miniCarouselRealCount = 0;
    let miniCurrentIndex = 0;
    let miniTimer = null;
    let miniTransitioning = false;
    let miniSlideWidth = 0;

    // 从 API 获取小型轮播数据，无数据则隐藏整个区块
    async function fetchMiniCarousel() {
        try {
            const res = await fetch('/api/content/home-mini-carousel');
            if (!res.ok) return null;
            const data = await res.json();
            return (data && data.length > 0) ? data : null;
        } catch (e) { console.log('小型轮播 API 不可用'); return null; }
    }

    function renderMiniCarousel(items) {
        const section = document.getElementById('miniCarouselSection');
        const track = document.getElementById('miniCarouselTrack');
        const indicators = document.getElementById('miniCarouselIndicators');
        if (!section || !track || !indicators) return;

        if (!items || items.length === 0) {
            section.classList.remove('has-data');
            return;
        }
        section.classList.add('has-data');
        MINI_CAROUSEL_ITEMS = items;
        miniCarouselRealCount = items.length;

        const makeSlideHTML = (item) => {
            const pid = item.productId || '';
            const name = item.name || productNameMap[pid] || pid || 'KOOMZE';
            const desc = item.description || '';
            const bgImg = item.bgImage || '';
            const fgImg = item.fgImage || '';
            const link = 'product-detail.html?id=' + encodeURIComponent(pid);
            const descHTML = desc ? `<div class="mini-card-desc">${desc}</div>` : '';
            return `
            <div class="mini-carousel-slide">
                <div class="mini-card">
                    <img class="mini-card-bg" src="${bgImg}" alt="">
                    <img class="mini-card-fg" src="${fgImg}" alt="${name}">
                    <div class="mini-card-info">
                        <div class="mini-card-name">${name}</div>
                        ${descHTML}
                        <a class="mini-card-btn" href="${link}"><img src="Pictures/components/查看.svg" alt="">查看详情</a>
                    </div>
                </div>
            </div>`;
        };

        // 无限循环：克隆首尾
        if (miniCarouselRealCount === 1) {
            track.innerHTML = makeSlideHTML(items[0]) + makeSlideHTML(items[0]) + makeSlideHTML(items[0]);
        } else {
            track.innerHTML = makeSlideHTML(items[miniCarouselRealCount - 1])
                + items.map(item => makeSlideHTML(item)).join('')
                + makeSlideHTML(items[0]);
        }

        // 渲染指示器
        indicators.innerHTML = items.map((_, i) =>
            `<button class="mini-carousel-indicator${i === 0 ? ' active' : ''}" data-index="${i}" aria-label="Slide ${i + 1}"></button>`
        ).join('');

        // 初始位置（跳过克隆的第一张）
        track.style.transition = 'none';
        updateMiniSlideWidth();
        track.style.transform = `translateX(-${miniSlideWidth}px)`;
        miniCurrentIndex = 0;
    }

    function updateMiniSlideWidth() {
        const slide = document.querySelector('.mini-carousel-slide');
        if (!slide) return;
        miniSlideWidth = slide.getBoundingClientRect().width;
    }

    function updateMiniIndicators(index) {
        const dots = document.querySelectorAll('.mini-carousel-indicator');
        dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
    }

    function setMiniCarouselPos(index, animated = true) {
        const track = document.getElementById('miniCarouselTrack');
        if (!track) return;
        track.style.transition = animated ? 'transform 0.5s ease' : 'none';
        if (!miniSlideWidth) updateMiniSlideWidth();
        // index 0 = real first slide, but we have clone before it, so +1 offset
        track.style.transform = `translateX(-${(index + 1) * miniSlideWidth}px)`;
    }

    function updateMiniCarouselState(index) {
        if (miniTransitioning) return;
        if (index < 0) {
            miniCurrentIndex = miniCarouselRealCount - 1;
        } else if (index >= miniCarouselRealCount) {
            miniCurrentIndex = 0;
        } else {
            miniCurrentIndex = index;
        }
        updateMiniIndicators(miniCurrentIndex);
        setMiniCarouselPos(miniCurrentIndex, true);
    }

    function nextMiniSlide() {
        if (miniTransitioning) return;
        updateMiniCarouselState(miniCurrentIndex + 1);
    }

    function prevMiniSlide() {
        if (miniTransitioning) return;
        updateMiniCarouselState(miniCurrentIndex - 1);
    }

    function startMiniAutoScroll() {
        if (miniTimer) clearInterval(miniTimer);
        if (miniCarouselRealCount <= 1) return;
        miniTimer = setInterval(nextMiniSlide, 5000);
    }

    function initMiniCarouselEvents() {
        // 指示器点击
        document.getElementById('miniCarouselIndicators').addEventListener('click', e => {
            const btn = e.target.closest('.mini-carousel-indicator');
            if (!btn) return;
            const idx = Number(btn.dataset.index);
            updateMiniCarouselState(idx);
            startMiniAutoScroll();
        });
        // 箭头
        document.getElementById('miniCarouselPrev').addEventListener('click', () => { prevMiniSlide(); startMiniAutoScroll(); });
        document.getElementById('miniCarouselNext').addEventListener('click', () => { nextMiniSlide(); startMiniAutoScroll(); });

        // 过渡结束 — 无缝循环重置
        const track = document.getElementById('miniCarouselTrack');
        if (!track) return;
        track.addEventListener('transitionstart', () => { miniTransitioning = true; });
        track.addEventListener('transitionend', () => {
            miniTransitioning = false;
            if (miniCurrentIndex >= miniCarouselRealCount) {
                miniCurrentIndex = 0;
                setMiniCarouselPos(0, false);
                updateMiniIndicators(0);
            } else if (miniCurrentIndex < 0) {
                miniCurrentIndex = miniCarouselRealCount - 1;
                setMiniCarouselPos(miniCurrentIndex, false);
                updateMiniIndicators(miniCurrentIndex);
            }
        });

        // 窗口大小变化时重新计算
        window.addEventListener('resize', () => {
            updateMiniSlideWidth();
            setMiniCarouselPos(miniCurrentIndex, false);
        });
    }

    let miniCarouselEventsInitialized = false;

    async function initMiniCarousel() {
        const data = await fetchMiniCarousel();
        const items = data ? data.sort((a, b) => (a.order || 0) - (b.order || 0)) : null;
        if (items && items.length > 0) {
            renderMiniCarousel(items);
            if (!miniCarouselEventsInitialized) {
                initMiniCarouselEvents();
                miniCarouselEventsInitialized = true;
            }
            startMiniAutoScroll();
        }
        // 无数据时区块保持隐藏状态
    }

    let currentSlideIndex = 0;
    let carouselTimer = null;
    let carouselIndicatorsInitialized = false;
    let carouselTransitioning = false;
    let carouselSlideWidth = 0;

    function renderCarousel() {
        const track = document.getElementById('carouselTrack');
        const indicators = document.getElementById('carouselIndicators');
        const makeSlideHTML = (item) => {
            const descHTML = item.description ? `<div class="carousel-desc">${item.description}</div>` : '';
            return `
            <div class="carousel-slide">
                <img src="${item.img}" alt="${item.title}" onerror="this.src='https://placehold.co/1200x520/12141d/e8e9f0?text=KOOMZE'">
                <div class="carousel-overlay">
                    <div class="carousel-title">${item.title}</div>
                    ${descHTML}
                    <a class="carousel-btn" href="${item.link || '#'}"><img src="Pictures/components/查看.svg" alt="">查看详情</a>
                </div>
            </div>`;
        };
        track.innerHTML = makeSlideHTML(CAROUSEL_ITEMS[CAROUSEL_REAL_SLIDE_COUNT - 1])
            + CAROUSEL_ITEMS.map(item => makeSlideHTML(item)).join('')
            + makeSlideHTML(CAROUSEL_ITEMS[0]);
        // Fix data-index attributes for transition logic
        const allSlides = track.querySelectorAll('.carousel-slide');
        allSlides[0].setAttribute('data-index', '-1');
        for (let i = 1; i <= CAROUSEL_REAL_SLIDE_COUNT; i++) allSlides[i].setAttribute('data-index', String(i - 1));
        allSlides[allSlides.length - 1].setAttribute('data-index', String(CAROUSEL_REAL_SLIDE_COUNT));
        indicators.innerHTML = CAROUSEL_ITEMS.map((_, index) =>
            `<button class="carousel-indicator${index===0 ? ' active' : ''}" data-index="${index}" aria-label="Slide ${index+1}"></button>`
        ).join('');

        const trackNode = document.getElementById('carouselTrack');
        trackNode.style.transform = 'translateX(0)';
        trackNode.style.transition = 'none';
        updateCarouselSlideWidth();
    }

    function updateCarouselSlideWidth() {
        const slide = document.querySelector('.carousel-slide');
        if (!slide) return;
        carouselSlideWidth = slide.getBoundingClientRect().width;
    }

    function updateIndicators(index) {
        const indicators = document.querySelectorAll('.carousel-indicator');
        indicators.forEach((dot, i) => dot.classList.toggle('active', i === index));
    }

    function updateSlideActiveClass(index) {
        const slides = document.querySelectorAll('.carousel-slide');
        slides.forEach((slide, i) => slide.classList.toggle('active', i === index + 1));
    }

    function setCarouselPosition(index, animated = true) {
        const trackNode = document.getElementById('carouselTrack');
        if (!trackNode) return;
        trackNode.style.transition = animated ? 'transform 0.6s ease' : 'none';
        if (!carouselSlideWidth) updateCarouselSlideWidth();
        trackNode.style.transform = `translateX(-${(index + 1) * carouselSlideWidth}px)`;
    }

    function updateCarouselState(index) {
        if (index < 0) {
            currentSlideIndex = -1;
        } else if (index > CAROUSEL_REAL_SLIDE_COUNT) {
            currentSlideIndex = 0;
        } else {
            currentSlideIndex = index;
        }
        const actualIndex = currentSlideIndex < 0 ? CAROUSEL_REAL_SLIDE_COUNT - 1 : currentSlideIndex >= CAROUSEL_REAL_SLIDE_COUNT ? 0 : currentSlideIndex;
        updateIndicators(actualIndex);
        updateSlideActiveClass(actualIndex);
        setCarouselPosition(currentSlideIndex, true);
    }

    function nextCarouselSlide() {
        if (carouselTransitioning) return;
        updateCarouselState(currentSlideIndex + 1);
    }

    function prevCarouselSlide() {
        if (carouselTransitioning) return;
        updateCarouselState(currentSlideIndex - 1);
    }

    function startCarouselAutoScroll() {
        if (carouselTimer) clearInterval(carouselTimer);
        carouselTimer = setInterval(nextCarouselSlide, 5000);
    }

    function initCarouselIndicators() {
        if (carouselIndicatorsInitialized) return;
        carouselIndicatorsInitialized = true;
        document.getElementById('carouselIndicators').addEventListener('click', e => {
            const button = e.target.closest('.carousel-indicator');
            if (!button) return;
            updateCarouselState(Number(button.dataset.index));
            startCarouselAutoScroll();
        });
        document.getElementById('carouselPrev').addEventListener('click', () => { prevCarouselSlide(); startCarouselAutoScroll(); });
        document.getElementById('carouselNext').addEventListener('click', () => { nextCarouselSlide(); startCarouselAutoScroll(); });
    }

    function initCarouselTransitionReset() {
        const trackNode = document.getElementById('carouselTrack');
        if (!trackNode) return;
        trackNode.addEventListener('transitionstart', () => { carouselTransitioning = true; });
        trackNode.addEventListener('transitionend', () => {
            carouselTransitioning = false;
            if (currentSlideIndex === CAROUSEL_REAL_SLIDE_COUNT) {
                currentSlideIndex = 0;
                setCarouselPosition(0, false);
                updateIndicators(0);
                updateSlideActiveClass(0);
            } else if (currentSlideIndex === -1) {
                currentSlideIndex = CAROUSEL_REAL_SLIDE_COUNT - 1;
                setCarouselPosition(currentSlideIndex, false);
                updateIndicators(currentSlideIndex);
                updateSlideActiveClass(currentSlideIndex);
            }
        });
    }

    function initCarouselResize() {
        window.addEventListener('resize', () => {
            updateCarouselSlideWidth();
            setCarouselPosition(currentSlideIndex, false);
        });
    }

    async function refreshUI() {
        await initData();  // 先从 API 拉数据
        renderCarousel();
        initCarouselIndicators();
        initCarouselTransitionReset();
        initCarouselResize();
        updateCarouselState(0);
        startCarouselAutoScroll();
        initMiniCarousel(); // 初始化小型叠加轮播
    }

    function initScrollEffect() {
        const topBar = document.getElementById('topBar');
        const handler = () => topBar.classList.toggle('scrolled', window.scrollY > 10);
        window.addEventListener('scroll', handler, { passive: true });
        handler();
    }

    window.addEventListener('DOMContentLoaded', () => {
        initCommon(function() { refreshUI(); });
        refreshUI();
        initDynamicNav();
        initFooterSocial();
        initScrollEffect();

        /* Page loader — fade in image → hold → fade out */
        const loader = document.getElementById('pageLoader');
        if (loader) {
            const HOLD_DURATION = 2500;   /* image visible for 2.5s before fading */
            let loaderHidden = false;
            function hideLoader() {
                if (loaderHidden) return;
                loaderHidden = true;
                loader.classList.add('hidden');
            }
            window.addEventListener('load', () => {
                const elapsed = performance.now();
                const delay = Math.max(HOLD_DURATION - elapsed, 300);
                setTimeout(hideLoader, delay);
            });
            /* fallback */
            setTimeout(hideLoader, HOLD_DURATION + 1500);
        }
    });
</script>
</body>
</html>
