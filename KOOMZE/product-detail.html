<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品详情 - KOOMZE</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="common.css">
  <style>
    /* ========== Detail Page — Layout ========== */
    .container { max-width:1100px; margin:0 auto; padding:30px 24px 60px; padding-top: calc(30px + var(--topbar-h, 56px)); position:relative; z-index:1; }
    .detail-layout { display:flex; gap:40px; align-items:flex-start; }
    .detail-left { flex:0 0 52%; position:sticky; top:calc(var(--topbar-h, 56px) + 20px); }
    .detail-right { flex:1; min-width:0; text-align:left; }

    /* ========== Detail Page — Main Image ========== */
    .main-image { width:100%; margin-bottom:20px; border-radius:0; overflow:hidden; box-shadow:0 12px 40px var(--shadow); }
    .main-image img { width:100%; border-radius:0; object-fit:contain; display:block; background:#f5f5f7; transition: opacity 0.3s ease; }

    /* ========== Detail Page — Color Selector ========== */
    .color-selector { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; margin-bottom:8px; }
    .color-dot {
        width:44px; height:44px; border-radius:50%; cursor:pointer;
        border:3px solid var(--border); background:#f5f5f7;
        background-size:cover; background-position:center;
        transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
        position:relative; flex-shrink:0;
    }
    .color-dot:hover { transform:scale(1.12); border-color:var(--theme); box-shadow:0 4px 16px var(--theme-glow); }
    .color-dot.active { border-color:var(--theme); box-shadow:0 0 0 4px var(--theme-glow); transform:scale(1.08); }
    .color-dot::after {
        content:attr(data-label); position:absolute; bottom:-24px; left:50%;
        transform:translateX(-50%); font-size:12px; color:var(--text2);
        white-space:nowrap; font-weight:500; opacity:0;
        transition: opacity 0.2s ease;
    }
    .color-dot:hover::after, .color-dot.active::after { opacity:1; }
    .color-selector-label { width:100%; text-align:center; font-size:13px; color:var(--text3); margin-bottom:4px; }

    /* ========== Detail Page — Product Name ========== */
    h1 { font-size:2rem; margin-bottom:16px; font-weight:800; text-align:left; }

    /* ========== Detail Page — Introduction ========== */
    .product-introduction {
        background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
        padding:20px 24px; margin-bottom:24px; line-height:1.8;
        color:var(--text); font-size:0.95rem;
    }
    .product-introduction:empty { display:none; }
    .product-introduction h2, .product-introduction h3 { margin:16px 0 8px; font-weight:700; }
    .product-introduction h2 { font-size:1.2rem; color:var(--theme); }
    .product-introduction h3 { font-size:1.05rem; }
    .product-introduction ul, .product-introduction ol { padding-left:20px; margin:8px 0; }
    .product-introduction li { margin:4px 0; }
    .product-introduction strong { color:var(--text); }
    .product-introduction p { margin:8px 0; }
    .intro-title { font-size:1.1rem; font-weight:700; color:var(--theme); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
    .section-icon { width:22px; height:22px; object-fit:contain; vertical-align:middle; }
    .back-link { display:inline-block; margin-top:20px; color:var(--theme); text-decoration:none; font-weight:600; transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1); }
    .back-link:hover { transform:translateX(-4px); }

    /* ========== Detail Page — Buy Button & Hover Popup ========== */
    .buy-section { position:relative; display:inline-block; margin-top:8px; }
    .buy-trigger {
      display:inline-flex; align-items:center; gap:8px;
      background:var(--theme); color:#fff; padding:16px 44px; border-radius:8px;
      font-weight:700; font-size:1.05rem; cursor:pointer; border:none;
      box-shadow:0 6px 24px var(--theme-glow);
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      position:relative;
    }
    .buy-icon-inline { width:22px; height:22px; object-fit:contain; vertical-align:middle; filter:brightness(0)invert(1); }
    .buy-trigger:hover { background:var(--theme2); box-shadow:0 8px 32px var(--theme-glow); transform:translateY(-2px); }
    .buy-popup {
      position:absolute; bottom:calc(100% + 16px); left:50%; transform:translateX(-50%);
      background:var(--card); border:1px solid var(--border); border-radius:12px;
      padding:12px 8px; display:flex; gap:10px;
      box-shadow:0 16px 48px rgba(0,0,0,0.25);
      opacity:0; visibility:hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      transform:translateX(-50%) translateY(8px);
      white-space:nowrap; z-index:100;
    }
    .buy-trigger:hover .buy-popup,
    .buy-popup:hover { opacity:1; visibility:visible; transform:translateX(-50%) translateY(0); }
    .buy-popup::after {
      content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
      border:8px solid transparent; border-top-color:var(--card);
    }
    .buy-platform {
      display:flex; flex-direction:column; align-items:center; gap:6px;
      padding:14px 20px; border-radius:10px; text-decoration:none;
      font-weight:600; font-size:0.85rem; color:var(--text);
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      min-width:80px; background:var(--bg); border:1px solid transparent;
    }
    .buy-platform:hover { transform:translateY(-4px); }
    .buy-platform.taobao:hover { background:#ff5000; color:#fff; border-color:#ff5000; box-shadow:0 8px 24px rgba(255,80,0,0.35); }
    .buy-platform.jd:hover { background:#e2231a; color:#fff; border-color:#e2231a; box-shadow:0 8px 24px rgba(226,35,26,0.35); }
    .buy-platform.douyin:hover { background:#fe2c55; color:#fff; border-color:#fe2c55; box-shadow:0 8px 24px rgba(254,44,85,0.35); }
    .buy-platform-icon { width:28px; height:28px; object-fit:contain; display:block; }
    /* hover 时图标反白 */
    .buy-platform.taobao:hover .buy-platform-icon { filter:brightness(0)invert(1); }
    .buy-platform.jd:hover .buy-platform-icon { filter:brightness(0)invert(1); }
    .buy-platform.douyin:hover .buy-platform-icon { filter:brightness(0)invert(1); }

    /* ========== Detail Page — Entry Animations ========== */
    .detail-left { animation:fadeInUp 0.5s ease both; animation-delay:0.1s; }
    .detail-right { animation:fadeInUp 0.5s ease both; animation-delay:0.2s; }
    .back-link { animation:fadeIn 0.5s ease both; animation-delay:0.4s; }

    /* ========== Detail Page — Responsive ========== */
    @media (max-width:768px) {
        .detail-layout { flex-direction:column; gap:24px; }
        .detail-left { position:static; flex:auto; }
        .detail-right { text-align:center; }
        h1 { text-align:center; }
        .color-dot { width:36px; height:36px; }
    }
  </style>
</head>
<body>

    </div>
  </div>

<script src="common.js"></script>
<script>
  // ========== 兜底数据（API 不可用时使用） ==========
  const PRODUCTS_FALLBACK = [
    { pid:"H71",  img:"Pictures/白底图/H71键盘.png",      links:{taobao:"#",jd:"#",douyin:"#"}, name_zh:"H71键盘",     name_tw:"H71鍵盤",     name_en:"H71" },
    { pid:"S6",   img:"Pictures/白底图/S6音响.png",       links:{taobao:"#",jd:"#",douyin:"#"}, name_zh:"S6 音箱",     name_tw:"S6 音箱",     name_en:"S6 Speaker" },
    { pid:"S9",   img:"Pictures/白底图/S9音响.png",       links:{taobao:"#",jd:"#",douyin:"#"}, name_zh:"S9 音箱",     name_tw:"S9 音箱",     name_en:"S9 Speaker" },
    { pid:"H75",  img:"Pictures/白底图/H75键盘.png",      links:{taobao:"#",jd:"#",douyin:"#"}, name_zh:"H75键盘",     name_tw:"H75鍵盤",     name_en:"H75" },
    { pid:"H81",  img:"Pictures/白底图/H81键盘.png",      links:{taobao:"#",jd:"#",douyin:"#"}, name_zh:"H81键盘",     name_tw:"H81鍵盤",     name_en:"H81" },
    { pid:"H98",  img:"Pictures/白底图/H98键盘.png",      links:{taobao:"#",jd:"#",douyin:"#"}, name_zh:"H98键盘",     name_tw:"H98鍵盤",     name_en:"H98" },
    { pid:"H102", img:"Pictures/白底图/102键盘.png",      links:{taobao:"#",jd:"#",douyin:"#"}, name_zh:"H102键盘",    name_tw:"H102鍵盤",    name_en:"H102" },
    { pid:"CD",   img:"Pictures/白底图/CD机.png",         links:{taobao:"#",jd:"#",douyin:"#"}, name_zh:"科曼者CD机",  name_tw:"科曼者CD機",  name_en:"KOOMZE CD Player" },
    { pid:"K1",   img:"Pictures/白底图/K1头戴式耳机.png",  links:{taobao:"#",jd:"#",douyin:"#"}, name_zh:"K1 耳机",     name_tw:"K1 耳機",     name_en:"K1 Headset" },
    { pid:"75",   img:"Pictures/白底图/75键盘.png",       links:{taobao:"#",jd:"#",douyin:"#"}, name_zh:"75键盘",      name_tw:"75鍵盤",      name_en:"75 Keyboard" },
    { pid:"K9pAI",img:"Pictures/白底图/K9＋AI款.png",     links:{taobao:"#",jd:"#",douyin:"#"}, name_zh:"K9pAI 耳机",  name_tw:"K9pAI 耳機",  name_en:"K9pAI Headset" },
    { pid:"M7",   img:"Pictures/白底图/M7鼠标.png",       links:{taobao:"#",jd:"#",douyin:"#"}, name_zh:"M7 鼠标",     name_tw:"M7 滑鼠",     name_en:"M7 Mouse" },
    { pid:"C25",  img:"Pictures/白底图/CCD相机.png",      links:{taobao:"#",jd:"#",douyin:"#"}, name_zh:"C25 相机",     name_tw:"C25 相機",     name_en:"C25 Camera" }
  ];

  let product = null;
  let productNameMap = {};
  let currentColorIndex = 0;
  const urlParams = new URLSearchParams(window.location.search);
  const rawId = urlParams.get('id');

  function resolveName(pid, fallback) {
    return productNameMap[pid] || fallback || pid || '未知产品';
  }

  // ⚡ 从 API 拉产品详情 — 按 productId 精确筛选，仅返回一条数据
  async function fetchDetailFromAPI(pid) {
    try {
      const res = await fetch('/api/content/product-detail?productId=' + encodeURIComponent(pid));
      if (!res.ok) return null;
      const data = await res.json();
      if (!data || data.length === 0) return null;
      // 取第一条匹配记录
      const item = data[0];
      const name = resolveName(item.productId, item.productId);
      return {
        id: item.productId, pid: item.productId,
        img: item.image,
        colors: (item.colors && item.colors.length > 0) ? item.colors : null,
        introduction: item.introduction || '',
        links: {
          taobao: item.buyLink1 || '#',
          jd: item.buyLink2 || '#',
          douyin: item.buyLink3 || '#',
          link4: item.buyLink4 || '',
          link5: item.buyLink5 || ''
        },
        name_zh: name, name_tw: name, name_en: name
      };
    } catch (e) { return null; }
  }

  function loadProduct() {
    if (!product) { document.querySelector('.container').innerHTML='<p style="text-align:center;padding:60px;">产品不存在</p><a href="Main.html">返回首页</a>'; return false; }
    return true;
  }

  function getProductName(p) { return p['name_'+(currentLang==='zh-CN'?'zh':currentLang==='zh-TW'?'tw':'en')]; }

  function getCurrentImage() {
    if (product.colors && product.colors.length > 0 && currentColorIndex < product.colors.length) {
      return product.colors[currentColorIndex].image;
    }
    return product.img;
  }

  function renderColorSelector() {
    const selectorEl = document.getElementById('colorSelector');
    const labelEl = document.getElementById('colorLabel');
    if (!selectorEl) return;
    const colors = product.colors;
    if (!colors || colors.length <= 1) {
      selectorEl.innerHTML = '';
      labelEl.textContent = '';
      return;
    }
    labelEl.textContent = '选择颜色';
    selectorEl.innerHTML = colors.map((c, i) =>
      '<div class="color-dot' + (i === currentColorIndex ? ' active' : '') + '" data-index="' + i + '" data-label="' + escapeHTML(c.name) + '" style="background-image:url(\'' + escapeHTML(c.image) + '\');" title="' + escapeHTML(c.name) + '"></div>'
    ).join('');
    selectorEl.querySelectorAll('.color-dot').forEach(dot => {
      dot.addEventListener('click', function() {
        const idx = parseInt(this.dataset.index);
        if (idx === currentColorIndex) return;
        currentColorIndex = idx;
        document.getElementById('mainImage').src = getCurrentImage();
        selectorEl.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        this.classList.add('active');
      });
    });
  }

  function escapeHTML(str) {
    if (!str) return '';
    const div = document.createElement('div'); div.textContent = str; return div.innerHTML;
  }

  function updateContent() {
    document.getElementById('detail-name').innerText = getProductName(product);
    document.getElementById('mainImage').src = getCurrentImage();
    document.getElementById('mainImage').alt = getProductName(product);

    const introEl = document.getElementById('productIntro');
    const introContentEl = document.getElementById('introContent');
    if (introEl && introContentEl) {
      if (product.introduction && product.introduction.trim()) {
        introContentEl.innerHTML = product.introduction;
        introEl.style.display = 'block';
      } else {
        introEl.style.display = 'none';
      }
    }

    renderColorSelector();

    const links = product.links || {};
    const platforms = [
      { id: 'linkTaobao', href: links.taobao },
      { id: 'linkJd',     href: links.jd },
      { id: 'linkDouyin', href: links.douyin }
    ];
    let hasLink = false;
    platforms.forEach(p => {
      const el = document.getElementById(p.id);
      if (el) {
        if (p.href && p.href !== '#') { el.href = p.href; el.style.display = 'flex'; hasLink = true; }
        else { el.style.display = 'none'; }
      }
    });
    const buySection = document.querySelector('.buy-section');
    if (buySection) buySection.style.display = hasLink ? 'inline-block' : 'none';
  }

  function hideLoader() {
    const loader = document.getElementById('pageLoader');
    if (loader) { loader.classList.add('hidden'); }
  }

  async function init() {
    if (!rawId) {
      document.querySelector('.container').innerHTML = '<p style="text-align:center;padding:60px;">缺少产品 ID 参数</p><a href="Product.html">返回产品列表</a>';
      hideLoader();
      return;
    }

    // ⚡ 并行获取：产品列表（用于名称映射+导航）+ 产品详情（按 productId 筛选）
    const [products, detailData] = await Promise.all([
      fetchProducts(),
      fetchDetailFromAPI(rawId)
    ]);

    // 构建名称映射
    if (products && products.length > 0) {
      products.forEach(p => { productNameMap[p.productId] = p.name; });
    }

    // 确定产品数据
    if (detailData) {
      product = detailData;
    } else {
      // API 无数据，用兜底数据
      product = PRODUCTS_FALLBACK.find(p => String(p.pid) === String(rawId)) || null;
    }

    if (!loadProduct()) { hideLoader(); return; }

    initCommon(function() { updateContent(); });
    updateContent();

    // ⚡ 传入已获取的产品数据，避免导航重复请求
    initDynamicNav(products);
    initFooterSocial();

    // 内容加载完毕，隐藏动画
    hideLoader();
  }

  init();
</script>
